    const DEFAULT_PALETTE = ["#f5f5f4", "#a8a29e", "#44403c", "#0c0a09"];

    function nowMs() { return Date.now(); }

    function getStartOfWeek() {
      const now = new Date();
      const day = now.getDay();
      const diff = now.getDate() - day + (day === 0 ? -6 : 1);
      const start = new Date(now);
      start.setDate(diff);
      start.setHours(0, 0, 0, 0);
      return start;
    }

    function getDateKey(date) {
      const d = new Date(date);
      d.setHours(0, 0, 0, 0);
      return d.toISOString().split("T")[0];
    }

    function getCurrentStreak(completions = []) {
      const set = new Set(completions);
      let streak = 0;
      const today = new Date();
      today.setHours(0, 0, 0, 0);

      while (true) {
        const key = getDateKey(today);
        if (!set.has(key)) break;
        streak += 1;
        today.setDate(today.getDate() - 1);
      }

      return streak;
    }

    function getLongestStreak(completions = []) {
      const sorted = [...new Set(completions)].sort();
      if (!sorted.length) return 0;

      let longest = 1;
      let current = 1;

      for (let i = 1; i < sorted.length; i += 1) {
        const prev = new Date(sorted[i - 1] + "T00:00:00");
        const curr = new Date(sorted[i] + "T00:00:00");
        const diffDays = Math.round((curr - prev) / 86400000);

        if (diffDays === 1) {
          current += 1;
          longest = Math.max(longest, current);
        } else {
          current = 1;
        }
      }

      return longest;
    }

    function getCompletionRate(completions = [], days = 30) {
      if (!days) return 0;
      const set = new Set(completions);
      let completed = 0;
      const today = new Date();
      today.setHours(0, 0, 0, 0);

      for (let i = 0; i < days; i += 1) {
        const d = new Date(today);
        d.setDate(today.getDate() - i);
        if (set.has(getDateKey(d))) completed += 1;
      }

      return Math.round((completed / days) * 100);
    }

    function getWeeklyBuckets(completions = [], weeks = 8) {
      const set = new Set(completions);
      const startOfThisWeek = getStartOfWeek();
      const buckets = [];

      for (let w = weeks - 1; w >= 0; w -= 1) {
        const weekStart = new Date(startOfThisWeek);
        weekStart.setDate(startOfThisWeek.getDate() - (w * 7));
        let count = 0;

        for (let i = 0; i < 7; i += 1) {
          const d = new Date(weekStart);
          d.setDate(weekStart.getDate() + i);
          if (set.has(getDateKey(d))) count += 1;
        }

        buckets.push({
          label: w === 0 ? "Now" : `-${w}w`,
          count,
        });
      }

      return buckets;
    }

    function getAveragePerWeek(completions = []) {

      const sorted = [...new Set(completions)].sort();

      const last = new Date(sorted[sorted.length - 1] + "T00:00:00");
      const totalWeeks = Math.max(1, Math.ceil(((last - first) / 86400000 + 1) / 7));

    const generateRandomString = (length) => {
      const possible = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";

    async function extractAlbumPalette(imageUrl) {
      return new Promise((resolve) => {
        const img = new Image();
        img.crossOrigin = "anonymous";

        img.onload = () => {
          try {
            const canvas = document.createElement("canvas");
            const ctx = canvas.getContext("2d", { willReadFrequently: true });
            const size = 48;
            canvas.width = size;
            canvas.height = size;
            ctx.drawImage(img, 0, 0, size, size);

            const data = ctx.getImageData(0, 0, size, size).data;
            const buckets = [];

            for (let i = 0; i < data.length; i += 16) {
              const r = data[i], g = data[i + 1], b = data[i + 2], a = data[i + 3];
              if (a < 200) continue;
              const brightness = (r + g + b) / 3;
              if (brightness < 18 || brightness > 242) continue;
              buckets.push([r, g, b]);
            }

            if (!buckets.length) return resolve(DEFAULT_PALETTE);

            const sample = buckets.filter((_, i) => i % 3 === 0);
            const sorted = sample.sort((a, b) => (b[0] + b[1] + b[2]) - (a[0] + a[1] + a[2]));
            const picks = [
              sorted[0],
              sorted[Math.floor(sorted.length * 0.25)] || sorted[0],
              sorted[Math.floor(sorted.length * 0.55)] || sorted[0],
              sorted[Math.floor(sorted.length * 0.8)] || sorted[0],
            ];
            resolve(picks.map(([r, g, b]) => `rgb(${r}, ${g}, ${b})`));
          } catch {
            resolve(DEFAULT_PALETTE);
          }
        };

        img.onerror = () => resolve(DEFAULT_PALETTE);
        img.src = imageUrl;
      });
    }

    async function spotifyTokenRequest(params) {
      const response = await fetch("https://accounts.spotify.com/api/token", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: new URLSearchParams(params),
      });
      const data = await response.json();
      if (!response.ok) throw new Error(data?.error_description || data?.error || "Spotify token request failed");
      return data;
    }

    async function refreshSpotifyAccessToken(currentAuth) {
      if (!currentAuth?.refresh_token) throw new Error("No Spotify refresh token available");

      const data = await spotifyTokenRequest({
        client_id: SPOTIFY_CLIENT_ID,
        grant_type: "refresh_token",
        refresh_token: currentAuth.refresh_token,
      });

      return {
        access_token: data.access_token,
        refresh_token: data.refresh_token || currentAuth.refresh_token,
        token_type: data.token_type || "Bearer",
        scope: data.scope || currentAuth.scope || "",
        expires_at: nowMs() + ((data.expires_in || 3600) * 1000) - 60000,
      };
    }

    async function spotifyApiFetch(path, spotifyAuth, setSpotifyAuth, options = {}) {
      let authObj = spotifyAuth;
      if (!authObj?.access_token) throw new Error("Spotify is not connected");

      if (!authObj.expires_at || authObj.expires_at <= nowMs()) {
        authObj = await refreshSpotifyAccessToken(authObj);
        saveSpotifyAuth(authObj);
        setSpotifyAuth(authObj);
      }

      let response = await fetch("https://api.spotify.com/v1" + path, {
        ...options,
        headers: {
          ...(options.headers || {}),
          Authorization: "Bearer " + authObj.access_token,
        },
      });

      if (response.status === 401 && authObj.refresh_token) {
        authObj = await refreshSpotifyAccessToken(authObj);
        saveSpotifyAuth(authObj);
        setSpotifyAuth(authObj);

        response = await fetch("https://api.spotify.com/v1" + path, {
          ...options,
          headers: {
            ...(options.headers || {}),
            Authorization: "Bearer " + authObj.access_token,
          },
        });
      }

      if (!response.ok && response.status !== 204) {
        const text = await response.text().catch(() => "");
        throw new Error(`Spotify API ${response.status}: ${text || "request failed"}`);
      }

      return response;
    }

    function WeatherIcon({ code, className = "w-6 h-6" }) {
      const isClear = code === 0 || code === 1;
      const isCloudy = code === 2 || code === 3 || code === 45 || code === 48;
      const isRain = [51, 53, 55, 61, 63, 65, 80, 81, 82, 95, 96, 99].includes(code);

        let mounted = true;
        if (!albumArt) {
          setAlbumPalette(DEFAULT_PALETTE);
          return;

        return () => { mounted = false; };

        if (!spotifyAuth?.access_token) return;

            setData(null);
            setErrorLabel("");
            return;
          }
          setData(await res.json());
          setErrorLabel("");
        } catch (e) {
          console.warn("Spotify now playing failed:", e);
          setErrorLabel("Reconnect Spotify");

            setSpotifyAuth(null);
