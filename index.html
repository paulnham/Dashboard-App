<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <title>Zen Dashboard</title>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=Lora:ital,wght@0,400;1,400&display=swap"
    rel="stylesheet"
  />

  <script>
    tailwind.config = {
      darkMode: "class",
    };
  </script>

  <style>
    body {
      font-family: "Inter", sans-serif;
      transition: background-color 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      overflow-x: hidden;
      margin: 0;
    }

    body.light {
      background-color: #fdfaf7;
      color: #4a3f35;
    }

    body.dark {
      background-color: #0d0d0c;
      color: #f4f4f5;
    }

    .serif {
      font-family: "Lora", serif;
    }

    .glass-card {
      backdrop-filter: blur(16px);
      border-radius: 28px;
      overflow: hidden;
      position: relative;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .light .glass-card {
      background: rgba(255, 255, 255, 0.85);
      border: 1px solid rgba(180, 150, 110, 0.15);
      box-shadow: 0 4px 24px -6px rgba(0, 0, 0, 0.04);
    }

    .dark .glass-card {
      background: rgba(26, 26, 24, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 12px 40px -12px rgba(0, 0, 0, 0.6);
    }

    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    #loader {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.5s;
      background: #fdfaf7;
    }

    body.dark #loader {
      background: #0d0d0c;
    }

    .spinner {
      width: 28px;
      height: 28px;
      border: 2.5px solid transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      border-top-color: #4a3f35;
      border-right-color: #e5e0d8;
    }

    body.dark .spinner {
      border-top-color: #f4f4f5;
      border-right-color: #3f3f3c;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .habit-dot {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      font-weight: 800;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
      border: 1.5px solid transparent;
    }

    .habit-dot.active {
      background-color: #10b981;
      color: white;
      border-color: transparent;
      box-shadow: 0 4px 10px -2px rgba(16, 185, 129, 0.25);
    }

    .dark .habit-dot.active {
      background-color: #34d399;
      color: #064e3b;
      box-shadow: 0 0 15px rgba(52, 211, 153, 0.4);
    }

    .habit-dot.inactive {
      background-color: transparent;
      border-color: #e5e7eb;
      color: #9ca3af;
    }

    .dark .habit-dot.inactive {
      border-color: #262624;
      color: #4b5563;
    }

    .habit-dot.today {
      border-color: #10b981;
      border-width: 2px;
    }

    .dark .habit-dot.today {
      border-color: #34d399;
    }

    @keyframes sun-glow {
      0%, 100% { transform: scale(1); opacity: 0.9; }
      50% { transform: scale(1.1); opacity: 1; }
    }

    @keyframes ray-rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes rain-drop {
      0% { transform: translateY(-20px); opacity: 0; }
      50% { opacity: 1; }
      100% { transform: translateY(120px); opacity: 0; }
    }

    @keyframes cloud-move {
      0% { transform: translateX(-20px); }
      100% { transform: translateX(20px); }
    }

    .animate-sun-glow { animation: sun-glow 4s ease-in-out infinite; }
    .animate-ray-rotate { animation: ray-rotate 30s linear infinite; }
    .animate-rain-drop { animation: rain-drop 1s linear infinite; }
    .animate-cloud-move { animation: cloud-move 6s ease-in-out infinite alternate; }

    .sleep-overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: #0d0d0c;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .sleep-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .sleep-content {
      transform: translateY(30px);
      opacity: 0;
      transition: all 1s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s;
    }

    .sleep-overlay.active .sleep-content {
      transform: translateY(0);
      opacity: 1;
    }

    .task-checkbox {
      width: 18px;
      height: 18px;
      border: 1.5px solid #d1d5db;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .dark .task-checkbox {
      border-color: #3f3f3c;
    }

    .task-checkbox.checked {
      background-color: #10b981;
      border-color: #10b981;
    }

    .photo-card {
      height: 100%;
      min-height: 220px;
    }
  </style>
</head>
<body class="light">
  <div id="loader"><div class="spinner"></div></div>
  <div id="root"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import {
      getAuth,
      onAuthStateChanged,
      signInAnonymously,
      signInWithCustomToken,
    } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import {
      getFirestore,
      doc,
      setDoc,
      getDoc,
      collection,
      onSnapshot,
      updateDoc,
      deleteDoc,
    } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const { useState, useEffect, useCallback, useMemo, createElement: h } = React;

    // -------------------------
    // CONFIG
    // -------------------------
    // For GitHub Pages, paste your real Firebase config below if you want cloud sync.
    // Otherwise leave as null and the app will use localStorage for habits.
    const FIREBASE_CONFIG = null;

    const app = FIREBASE_CONFIG ? initializeApp(FIREBASE_CONFIG) : null;
    const auth = app ? getAuth(app) : null;
    const db = app ? getFirestore(app) : null;
    const appId = "zen-productivity-dashboard";

    const GOOGLE_CLIENT_ID =
      "719863282782-9dnqtj2r6msq1d9cohf70gike1idq565.apps.googleusercontent.com";
    const GOOGLE_SCOPES =
      "https://www.googleapis.com/auth/calendar.readonly https://www.googleapis.com/auth/tasks";
    const SPOTIFY_CLIENT_ID = "8d40f3a244f141ddb6be4e0e6d323b1a";

    const PHOTOS = [
      "https://images.unsplash.com/photo-1541364983171-a8ba01d95cfc?w=1000&q=80",
      "https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1000&q=80",
      "https://images.unsplash.com/photo-1476514525535-07fb3b4ae5f1?w=1000&q=80",
      "https://images.unsplash.com/photo-1493246507139-91e8fad9978e?w=1000&q=80",
    ];

    const WEATHER_CODES = {
      0: "Clear Sky",
      1: "Mainly Clear",
      2: "Partly Cloudy",
      3: "Overcast",
      45: "Fog",
      48: "Depositing Rime Fog",
      51: "Light Drizzle",
      53: "Moderate Drizzle",
      55: "Dense Drizzle",
      61: "Slight Rain",
      63: "Moderate Rain",
      65: "Heavy Rain",
      71: "Slight Snow",
      73: "Moderate Snow",
      75: "Heavy Snow",
      77: "Snow Grains",
      80: "Slight Rain Showers",
      81: "Moderate Rain Showers",
      82: "Violent Rain Showers",
      95: "Thunderstorm",
      96: "Thunderstorm with Hail",
      99: "Thunderstorm with Heavy Hail",
    };

    // -------------------------
    // HELPERS
    // -------------------------
    function getStartOfWeek() {
      const now = new Date();
      const day = now.getDay();
      const diff = now.getDate() - day + (day === 0 ? -6 : 1);
      const start = new Date(now);
      start.setDate(diff);
      start.setHours(0, 0, 0, 0);
      return start;
    }

    function safeJSONParse(value, fallback) {
      try {
        return JSON.parse(value);
      } catch {
        return fallback;
      }
    }

    function loadLocalHabits() {
      return safeJSONParse(localStorage.getItem("zen_habits_v1") || "[]", []);
    }

    function saveLocalHabits(habits) {
      localStorage.setItem("zen_habits_v1", JSON.stringify(habits));
    }

    const generateRandomString = (length) => {
      const possible =
        "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
      const values = crypto.getRandomValues(new Uint8Array(length));
      return values.reduce((acc, x) => acc + possible[x % possible.length], "");
    };

    const sha256 = async (plain) => {
      const encoder = new TextEncoder();
      const data = encoder.encode(plain);
      return window.crypto.subtle.digest("SHA-256", data);
    };

    const base64urlencode = (a) => {
      return btoa(String.fromCharCode.apply(null, new Uint8Array(a)))
        .replace(/\+/g, "-")
        .replace(/\//g, "_")
        .replace(/=+$/, "");
    };

    // -------------------------
    // UI COMPONENTS
    // -------------------------
    function ThemeToggle({ isDarkMode, onToggle }) {
      return h(
        "div",
        {
          onClick: onToggle,
          className:
            "w-[54px] h-[30px] bg-stone-200 dark:bg-stone-800 rounded-full relative cursor-pointer transition-all flex items-center px-1",
        },
        h(
          "div",
          {
            className:
              "w-[22px] h-[22px] bg-white dark:bg-stone-950 rounded-full flex items-center justify-center shadow transition-all transform " +
              (isDarkMode ? "translate-x-6" : "translate-x-0"),
          },
          isDarkMode
            ? h(
                "svg",
                {
                  width: 12,
                  height: 12,
                  viewBox: "0 0 24 24",
                  fill: "none",
                  stroke: "#fbbf24",
                  strokeWidth: 3,
                },
                h("path", { d: "M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" })
              )
            : h(
                "svg",
                {
                  width: 12,
                  height: 12,
                  viewBox: "0 0 24 24",
                  fill: "none",
                  stroke: "#6b7280",
                  strokeWidth: 3,
                },
                h("circle", { cx: 12, cy: 12, r: 5 }),
                h("path", {
                  d: "M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42",
                })
              )
        )
      );
    }

    function WeatherIcon({ code, className = "w-6 h-6" }) {
      const color =
        code === 0
          ? "text-amber-500"
          : code <= 3
          ? "text-stone-400 dark:text-stone-500"
          : "text-blue-500";

      const getPaths = () => {
        if (code === 0) {
          return [
            h("circle", { key: "c", cx: 12, cy: 12, r: 5 }),
            h("path", {
              key: "p",
              d: "M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42",
            }),
          ];
        }
        if (code <= 3) {
          return [
            h("path", {
              key: "p",
              d: "M17.5 19c2.5 0 4.5-2 4.5-4.5 0-2.4-1.9-4.3-4.3-4.5C16.9 6.8 14 4.5 10.5 4.5c-3.6 0-6.5 2.8-6.5 6.3 0 .1 0 .2.1.3C1.8 11.5 0 13.5 0 15.8 0 18.1 1.8 20 4 20h13.5",
            }),
          ];
        }
        return [h("circle", { key: "c", cx: 12, cy: 12, r: 10 })];
      };

      return h(
        "svg",
        {
          className: `${className} ${color}`,
          viewBox: "0 0 24 24",
          fill: "none",
          stroke: "currentColor",
          strokeWidth: 2,
          strokeLinecap: "round",
          strokeLinejoin: "round",
        },
        getPaths()
      );
    }

    function WeatherAnimation({ code }) {
      if (code <= 1) {
        return h(
          "div",
          {
            className:
              "absolute inset-0 flex items-center justify-center overflow-hidden bg-gradient-to-br from-amber-500/10 to-transparent",
          },
          h(
            "div",
            { className: "relative w-28 h-28" },
            h("div", {
              className:
                "absolute inset-0 bg-amber-400 rounded-full animate-sun-glow shadow-[0_0_80px_rgba(251,191,36,0.7)]",
            }),
            h(
              "div",
              { className: "absolute inset-[-40px] animate-ray-rotate" },
              [0, 45, 90, 135, 180, 225, 270, 315].map((deg) =>
                h("div", {
                  key: deg,
                  className:
                    "absolute top-1/2 left-1/2 w-2 h-10 bg-amber-500/60 rounded-full origin-bottom shadow-lg",
                  style: {
                    transform:
                      "translate(-50%, -100%) rotate(" +
                      deg +
                      "deg) translateY(-40px)",
                  },
                })
              )
            )
          )
        );
      }

      if (code <= 3) {
        return h(
          "div",
          {
            className:
              "absolute inset-0 flex items-center justify-center overflow-hidden",
          },
          h("div", {
            className:
              "absolute top-1/4 left-1/4 w-40 h-24 bg-stone-300/90 dark:bg-stone-600/70 rounded-full blur-2xl animate-cloud-move opacity-80",
          }),
          h("div", {
            className:
              "absolute top-1/2 right-1/4 w-48 h-28 bg-stone-400/80 dark:bg-stone-500/50 rounded-full blur-3xl animate-cloud-move opacity-70",
            style: { animationDelay: "-3s" },
          }),
          h("div", {
            className:
              "absolute bottom-1/4 left-1/3 w-36 h-20 bg-stone-200/70 dark:bg-stone-700/60 rounded-full blur-xl animate-cloud-move opacity-80",
            style: { animationDelay: "-1.5s" },
          })
        );
      }

      return null;
    }

    function ClockWidget({ large = false }) {
      const [now, setNow] = useState(new Date());

      useEffect(() => {
        const t = setInterval(() => setNow(new Date()), 1000);
        return () => clearInterval(t);
      }, []);

      const h12 = now.getHours() % 12 || 12;
      const m = now.getMinutes().toString().padStart(2, "0");
      const ampm = now.getHours() >= 12 ? "PM" : "AM";

      return h(
        "div",
        {
          className:
            "flex flex-col justify-center h-full " +
            (large ? "items-center text-center" : "p-7"),
        },
        h(
          "div",
          { className: "flex items-baseline gap-1.5" },
          h(
            "h1",
            {
              className:
                (large ? "text-[9rem]" : "text-5xl") +
                " font-light serif text-stone-800 dark:text-stone-100 leading-none",
            },
            h12,
            h("span", { className: "text-stone-200 dark:text-stone-800 mx-1" }, ":"),
            m
          ),
          h(
            "span",
            {
              className:
                (large ? "text-xl" : "text-sm") +
                " font-medium text-stone-400 dark:text-stone-600 uppercase tracking-tighter",
            },
            ampm
          )
        ),
        h(
          "p",
          {
            className:
              (large ? "text-xl mt-6" : "text-[11px] mt-1") +
              " text-stone-400 dark:text-stone-600 font-semibold tracking-[0.3em] uppercase",
          },
          now.toLocaleDateString("en-US", {
            weekday: "long",
            month: "short",
            day: "numeric",
          })
        )
      );
    }

    function SpotifyWidget({ token, ambient = false, onLogin }) {
      const [data, setData] = useState(null);

      const fetchNowPlaying = useCallback(async () => {
        if (!token) return;
        try {
          const res = await fetch(
            "https://api.spotify.com/v1/me/player/currently-playing",
            {
              headers: { Authorization: "Bearer " + token },
            }
          );
          if (res.status === 204) {
            setData(null);
            return;
          }
          if (!res.ok) return;
          setData(await res.json());
        } catch {}
      }, [token]);

      useEffect(() => {
        if (!token) return;
        fetchNowPlaying();
        const i = setInterval(fetchNowPlaying, 10000);
        return () => clearInterval(i);
      }, [token, fetchNowPlaying]);

      const track = data?.item;
      const isPlaying = data?.is_playing;
      const albumArt = track?.album?.images?.[0]?.url;

      const control = async (action) => {
        if (!token) return;
        try {
          await fetch("https://api.spotify.com/v1/me/player/" + action, {
            method: action === "play" || action === "pause" ? "PUT" : "POST",
            headers: { Authorization: "Bearer " + token },
          });
          setTimeout(fetchNowPlaying, 500);
        } catch {}
      };

      if (!token) {
        return h(
          "div",
          {
            className:
              "p-7 flex flex-col items-center justify-center h-full gap-4 text-center",
          },
          h(
            "div",
            {
              className:
                "w-16 h-16 bg-stone-100 dark:bg-stone-900 rounded-2xl flex items-center justify-center text-stone-300 text-3xl",
            },
            "♫"
          ),
          h(
            "div",
            null,
            h(
              "p",
              { className: "text-xs font-bold text-stone-400 uppercase tracking-widest" },
              "Spotify"
            ),
            h(
              "button",
              {
                onClick: onLogin,
                className:
                  "mt-3 text-[10px] font-black text-stone-800 dark:text-stone-100 border-b border-stone-200 dark:border-stone-800 pb-0.5",
              },
              "CONNECT ACCOUNT"
            )
          )
        );
      }

      const controlsLayer = h(
        "div",
        {
          className:
            "absolute bottom-0 left-0 right-0 h-2/5 bg-gradient-to-t from-black/90 via-black/40 to-transparent backdrop-blur-[2px] flex flex-col justify-end p-5 z-10",
        },
        h(
          "div",
          { className: "min-w-0 mb-3" },
          h(
            "p",
            { className: "text-[13px] font-bold text-white truncate tracking-tight" },
            track?.name || "Stopped"
          ),
          h(
            "p",
            { className: "text-[10px] text-white/60 truncate mt-0.5 uppercase tracking-widest" },
            track?.artists?.[0]?.name || "Spotify"
          )
        ),
        h(
          "div",
          { className: "flex justify-center items-center gap-8" },
          h(
            "button",
            {
              onClick: (e) => {
                e.stopPropagation();
                control("previous");
              },
              className: "text-white/60 hover:text-white transition-colors",
            },
            h(
              "svg",
              { width: 18, height: 18, fill: "currentColor", viewBox: "0 0 24 24" },
              h("path", { d: "M6 6h2v12H6zm3.5 6 8.5 6V6z" })
            )
          ),
          h(
            "button",
            {
              onClick: (e) => {
                e.stopPropagation();
                control(isPlaying ? "pause" : "play");
              },
              className: "text-white active:scale-90 transition-transform",
            },
            isPlaying
              ? h(
                  "svg",
                  { width: 22, height: 22, fill: "currentColor", viewBox: "0 0 24 24" },
                  h("path", { d: "M6 19h4V5H6v14zm8-14v14h4V5h-4z" })
                )
              : h(
                  "svg",
                  { width: 22, height: 22, fill: "currentColor", viewBox: "0 0 24 24" },
                  h("path", { d: "M8 5v14l11-7z" })
                )
          ),
          h(
            "button",
            {
              onClick: (e) => {
                e.stopPropagation();
                control("next");
              },
              className: "text-white/60 hover:text-white transition-colors",
            },
            h(
              "svg",
              { width: 18, height: 18, fill: "currentColor", viewBox: "0 0 24 24" },
              h("path", { d: "M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z" })
            )
          )
        )
      );

      if (ambient) {
        return h(
          "div",
          { className: "flex flex-col items-center gap-8" },
          h(
            "div",
            {
              className:
                "w-72 h-72 md:w-80 md:h-80 shadow-[0_40px_100px_-20px_rgba(0,0,0,0.8)] rounded-[48px] overflow-hidden ring-1 ring-white/10 bg-stone-100 dark:bg-stone-900",
            },
            albumArt
              ? h("img", { src: albumArt, className: "w-full h-full object-contain" })
              : h(
                  "div",
                  {
                    className:
                      "w-full h-full flex items-center justify-center text-stone-50 text-3xl",
                  },
                  "♫"
                )
          ),
          h(
            "div",
            { className: "text-center max-w-sm" },
            h(
              "h2",
              { className: "text-2xl font-bold text-white tracking-tight truncate" },
              track?.name || "Nothing Playing"
            ),
            h(
              "p",
              { className: "text-stone-500 text-lg mt-1 truncate" },
              track?.artists?.map((a) => a.name).join(", ") || "Ready"
            ),
            h(
              "div",
              { className: "flex justify-center items-center gap-10 mt-8" },
              h(
                "button",
                {
                  onClick: () => control("previous"),
                  className: "text-stone-400 hover:text-white transition-colors",
                },
                h(
                  "svg",
                  { width: 28, height: 28, fill: "currentColor", viewBox: "0 0 24 24" },
                  h("path", { d: "M6 6h2v12H6zm3.5 6 8.5 6V6z" })
                )
              ),
              h(
                "button",
                {
                  onClick: () => control(isPlaying ? "pause" : "play"),
                  className:
                    "w-16 h-16 bg-white text-black rounded-full flex items-center justify-center active:scale-90 shadow-xl",
                },
                isPlaying
                  ? h(
                      "svg",
                      { width: 24, height: 24, fill: "currentColor", viewBox: "0 0 24 24" },

    function HabitWidget({ habits = [], onNavigate, onToggleHabitCompletion }) {
      const startOfWeek = getStartOfWeek();

      const weekDays = useMemo(
        () =>
          Array.from({ length: 7 }, (_, i) => {
            const d = new Date(startOfWeek);
            d.setDate(d.getDate() + i);
            const dateStr = d.toISOString().split("T")[0];
            const todayStr = new Date().toISOString().split("T")[0];
            return {
              dateStr,
              label: ["M", "T", "W", "T", "F", "S", "S"][i],
              isToday: dateStr === todayStr,
            };
          }),
        [startOfWeek]
      );

      return h(
        "div",
        { className: "p-7 flex flex-col h-full" },
        h(
          "div",

            },
            "Manage"
          )
        ),
        h(
          "div",
          { className: "flex-1 overflow-y-auto no-scrollbar space-y-4" },
          habits.map((habit) => {
            const weekCount = (habit.completions || []).filter(
              (c) => new Date(c) >= startOfWeek

            return h(
              "div",
              { key: habit.id, className: "space-y-2" },
              h(

                { className: "flex justify-between items-end" },
                h(
                  "p",

                  },

                    day.label
                  )
                )
              )
            );
          })

    function CalendarGrid({
      viewDate,
      onMonthChange,
      onOpenFilter,
      events,
      onDateClick,
    }) {
      const y = viewDate?.getFullYear() || new Date().getFullYear();
      const m = viewDate?.getMonth() ?? new Date().getMonth();
      const start = new Date(y, m, 1).getDay();
      const daysCount = new Date(y, m + 1, 0).getDate();

      const cells = Array.from({ length: 42 }, (_, i) =>
        i >= start && i < start + daysCount ? i - start + 1 : null
      );

      const eventDaysSet = useMemo(() => {
        const s = new Set();
        events.forEach((e) => {
          const d = new Date(e.rawDate);
          if (d.getMonth() === m && d.getFullYear() === y) s.add(d.getDate());
        });
        return s;
      }, [events, m, y]);

      const changeMonth = (offset) => onMonthChange(new Date(y, m + offset, 1));

      return h(
        "div",
        { className: "p-6 flex flex-col h-full" },
        h(
          "div",
          { className: "flex justify-between items-center mb-4 flex-shrink-0" },
          h(
            "div",
            { className: "flex items-center gap-2" },
            h(
              "button",
              {
                onClick: () => changeMonth(-1),
                className: "p-1 hover:bg-stone-100 dark:hover:bg-white/5 rounded-lg text-stone-400",
              },
              h(
                "svg",
                { width: 14, height: 14, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: 2.5 },
                h("path", { d: "M15 18l-6-6 6-6" })
              )
            ),
            h(
              "h3",
              {
                className:
                  "text-[10px] font-bold text-stone-400 uppercase tracking-widest min-w-[70px] text-center",
              },
              new Date(y, m).toLocaleDateString("en-US", {
                month: "short",
                year: "numeric",
              })
            ),
            h(
              "button",
              {
                onClick: () => changeMonth(1),
                className: "p-1 hover:bg-stone-100 dark:hover:bg-white/5 rounded-lg text-stone-400",
              },
              h(
                "svg",
                { width: 14, height: 14, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: 2.5 },
                h("path", { d: "M9 18l6-6-6-6" })
              )
            )
          ),
          h(
            "div",
            { className: "flex gap-3 items-center" },
            h(
              "button",
              {
                onClick: onOpenFilter,
                className: "text-stone-300 hover:text-stone-600 transition-colors",
              },
              h(
                "svg",
                { width: 14, height: 14, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: 2.5 },
                h("path", { d: "M22 3H2l8 9.46V19l4 2v-8.54L22 3z" })
              )
            ),
            h(
              "button",
              {
                onClick: () => onMonthChange(new Date()),
                className: "text-[9px] font-bold text-stone-400 hover:text-stone-800 uppercase",
              },
              "Today"
            )
          )
        ),
        h(
          "div",
          { className: "grid grid-cols-7 gap-1 text-center flex-1" },
          ["S", "M", "T", "W", "T", "F", "S"].map((d) =>
            h("span", { key: d, className: "text-[9px] font-bold text-stone-200" }, d)
          ),
          cells.map((day, i) => {
            const hasEvent = day && eventDaysSet.has(day);

            return h(
              "div",
              {
                key: i,
                onClick: () => {
                  if (hasEvent) {
                    const dayEvents = events.filter((e) => {
                      const d = new Date(e.rawDate);
                      return (
                        d.getDate() === day &&
                        d.getMonth() === m &&
                        d.getFullYear() === y
                      );
                    });
                    onDateClick(dayEvents, new Date(y, m, day));
                  }
                },
                className:
                  "relative flex items-center justify-center text-[11px] " +
                  (hasEvent
                    ? "cursor-pointer hover:bg-stone-50 dark:hover:bg-white/5 rounded-full"
                    : ""),
              },
              day &&
                h(
                  "span",
                  {
                    className: `w-6 h-6 flex items-center justify-center rounded-full ${
                      day === new Date().getDate() &&
                      m === new Date().getMonth() &&
                      y === new Date().getFullYear()
                        ? "bg-stone-800 text-white dark:bg-stone-100 dark:text-stone-950 font-bold"
                        : "text-stone-600 dark:text-stone-400"
                    }`,
                  },
                  day
                ),
              hasEvent &&
                h("div", {
                  className:
                    "absolute bottom-0.5 w-0.5 h-0.5 bg-stone-300 dark:bg-stone-700 rounded-full",
                })
            );
          })
        )
      );
    }

        if (!("geolocation" in navigator)) return;

        navigator.geolocation.getCurrentPosition(
          async (position) => {
            const { latitude, longitude } = position.coords;
            setCoords({ lat: latitude, lon: longitude });

            try {
              const res = await fetch(
                "https://nominatim.openstreetmap.org/reverse?lat=" +
                  latitude +
                  "&lon=" +
                  longitude +
                  "&format=json"
              );
              const data = await res.json();
              const city =
                data?.address?.city ||
                data?.address?.town ||
                data?.address?.village ||
                data?.address?.suburb ||
                "Current Location";
              setLocationLabel(city);
            } catch {
              setLocationLabel("Current Location");
            }
          },
          () => {}
        );
      }, []);

      // Firebase auth - safe on GitHub Pages even if Firebase is disabled
      useEffect(() => {
        if (!auth) return;

        let unsubscribe = () => {};

        const initAuth = async () => {
          try {
            const customToken =
              typeof window.__initial_auth_token !== "undefined"
                ? window.__initial_auth_token
                : null;

            if (customToken) {
              await signInWithCustomToken(auth, customToken);
            } else {
              await signInAnonymously(auth);
            }
          } catch (e) {
            console.warn("Auth initialization failed:", e);
          }

          unsubscribe = onAuthStateChanged(auth, setUser);
        };

        initAuth();

        return () => unsubscribe();
      }, []);

      // Firestore syncing if Firebase is configured, localStorage otherwise
      useEffect(() => {
        if (!db || !user) {
          setHabits(loadLocalHabits());
          return;
        }

        const habitsCollection = collection(
          db,
          "artifacts",
          appId,
          "users",
          user.uid,
          "habits"
        );

        const migrate = async () => {
          try {
            const localHabits = loadLocalHabits();
            if (localHabits.length > 0) {
              const existingCheck = await getDoc(
                doc(habitsCollection, String(localHabits[0].id))
              );
              if (!existingCheck.exists()) {
                for (const habit of localHabits) {
                  await setDoc(doc(habitsCollection, String(habit.id)), habit);
                }
              }
            }
          } catch (e) {
            console.warn("Migration failed:", e);
          }
        };

        migrate();

        const unsubscribe = onSnapshot(
          habitsCollection,
          (snapshot) => {
            const list = snapshot.docs.map((d) => ({ id: d.id, ...d.data() }));
            setHabits(list);
          },
          (err) => {
            console.error(err);
            setHabits(loadLocalHabits());
          }
        );

        return () => unsubscribe();
      }, [user]);

      const updateHabitInCloud = async (id, updatedData) => {
        if (db && user) {
          const habitDoc = doc(
            db,
            "artifacts",
            appId,
            "users",
            user.uid,
            "habits",
            String(id)
          );
          await updateDoc(habitDoc, updatedData);
          return;
        }

        const next = habits.map((h) =>
          String(h.id) === String(id) ? { ...h, ...updatedData } : h
        );
        setHabits(next);
        saveLocalHabits(next);
      };

      const addHabitToCloud = async (name, goal) => {
        const id = Date.now().toString();
        const newHabit = { id, name, goal, completions: [] };

        if (db && user) {
          const habitDoc = doc(
            db,
            "artifacts",
            appId,
            "users",
            user.uid,
            "habits",
            id
          );
          await setDoc(habitDoc, newHabit);
          return;
        }

        const next = [...habits, newHabit];
        setHabits(next);
        saveLocalHabits(next);
      };

      const deleteHabitFromCloud = async (id) => {
        if (db && user) {
          const habitDoc = doc(
            db,
            "artifacts",
            appId,
            "users",
            user.uid,
            "habits",
            String(id)
          );
          await deleteDoc(habitDoc);
          return;
        }

        const next = habits.filter((h) => String(h.id) !== String(id));
        setHabits(next);
        saveLocalHabits(next);
      };

      // Spotify token handling
      useEffect(() => {
        const handleSpotifyToken = async () => {
          const params = new URLSearchParams(window.location.search);
          const code = params.get("code");
          const codeVerifier = localStorage.getItem("spotify_code_verifier");

          if (code && codeVerifier) {
            try {
              const response = await fetch("https://accounts.spotify.com/api/token", {
                method: "POST",
                headers: {
                  "Content-Type": "application/x-www-form-urlencoded",
                },
                body: new URLSearchParams({
                  client_id: SPOTIFY_CLIENT_ID,
                  grant_type: "authorization_code",
                  code,
                  redirect_uri: window.location.origin + window.location.pathname,
                  code_verifier: codeVerifier,
                }),
              });

              const data = await response.json();

              if (data.access_token) {
                setSpotifyToken(data.access_token);
                localStorage.setItem("zen_spotify_token", data.access_token);
                window.history.replaceState({}, document.title, window.location.pathname);
              }
            } catch {}
          }
        };

        handleSpotifyToken();

        const hash = window.location.hash;
        if (hash) {
          const params = new URLSearchParams(hash.substring(1));
          const token = params.get("access_token");
          if (token) {
            setSpotifyToken(token);
            localStorage.setItem("zen_spotify_token", token);
            window.location.hash = "";
          }
        }
      }, []);

      useEffect(() => {
        const loader = document.getElementById("loader");
        if (!loader) return;
        requestAnimationFrame(() => {
          loader.style.opacity = "0";
          setTimeout(() => {
            loader.style.display = "none";
          }, 300);
        });
      }, []);

      // Theme
      useEffect(() => {
        document.documentElement.classList.toggle("dark", isDarkMode);
        document.body.className = isDarkMode ? "dark" : "light";
        localStorage.setItem("zen_theme", isDarkMode ? "dark" : "light");
      }, [isDarkMode]);

      // Weather
      useEffect(() => {
        const fetchWeather = async () => {
          try {
            const res = await fetch(
              "https://api.open-meteo.com/v1/forecast?latitude=" +
                coords.lat +
                "&longitude=" +
                coords.lon +
                "&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m&daily=weather_code,temperature_2m_max,temperature_2m_min,uv_index_max,sunrise,sunset,precipitation_probability_max&temperature_unit=fahrenheit&wind_speed_unit=mph&precipitation_unit=inch&timezone=auto"
            );
            if (!res.ok) return;
            setWeatherData(await res.json());
          } catch {}
        };

        fetchWeather();
        const intervalId = setInterval(fetchWeather, 1800000);
        return () => clearInterval(intervalId);
      }, [coords]);

      // Google Calendar / Tasks
      const fetchGoogleData = useCallback(
        async (t) => {
          try {
            const start = new Date(viewDate.getFullYear(), viewDate.getMonth(), 1).toISOString();

            let calendarItems = calendars;
            if (calendarItems.length === 0) {
              const listRes = await fetch(
                "https://www.googleapis.com/calendar/v3/users/me/calendarList",
                {
                  headers: { Authorization: "Bearer " + t },
                }
              );
              const listData = await listRes.json();
              if (listData.items) {
                calendarItems = listData.items;
                setCalendars(listData.items);
              }
            }

            const ids =
              selectedCalIds.length > 0
                ? selectedCalIds
                : calendarItems.map((c) => c.id);

            if (ids.length > 0) {
              const results = await Promise.all(
                ids.map((id) =>
                  fetch(
                    "https://www.googleapis.com/calendar/v3/calendars/" +
                      encodeURIComponent(id) +
                      "/events?timeMin=" +
                      start +
                      "&singleEvents=true&orderBy=startTime",
                    {
                      headers: { Authorization: "Bearer " + t },
                    }
                  )
                    .then((r) => r.json())
                    .catch(() => ({ items: [] }))
                )
              );

              const merged = results
                .flatMap((r) => r.items || [])
                .map((ev) => ({
                  title: ev.summary || "Untitled",
                  rawDate: ev.start?.dateTime || ev.start?.date,
                  time: ev.start?.dateTime
                    ? new Date(ev.start.dateTime).toLocaleTimeString([], {
                        hour: "2-digit",
                        minute: "2-digit",
                      })
                    : "All Day",
                  location: ev.location || "",
                  notes: ev.description || "",
                }))
                .filter((e) => e.rawDate)
                .sort((a, b) => new Date(a.rawDate) - new Date(b.rawDate));

              setEvents(merged);
            }

            const resT = await fetch(
              "https://www.googleapis.com/tasks/v1/lists/@default/tasks?showCompleted=false&maxResults=10",
              {
                headers: { Authorization: "Bearer " + t },
              }
            );
            const dT = await resT.json();
            if (dT.items) {
              setTasks(dT.items.map((tk) => ({ id: tk.id, title: tk.title })));
            }
          } catch {}
        },
        [viewDate, calendars, selectedCalIds]
      );

      useEffect(() => {
        if (googleToken) fetchGoogleData(googleToken);
      }, [googleToken, fetchGoogleData]);

      const loginSpotify = async () => {
        const codeVerifier = generateRandomString(128);
        const hashed = await sha256(codeVerifier);
        const codeChallenge = base64urlencode(hashed);

        localStorage.setItem("spotify_code_verifier", codeVerifier);

        const redirectUri = window.location.origin + window.location.pathname;
        const params = new URLSearchParams({
          client_id: SPOTIFY_CLIENT_ID,
          response_type: "code",
          redirect_uri: redirectUri,
          code_challenge_method: "S256",
          code_challenge: codeChallenge,
          scope:
            "user-read-currently-playing user-read-playback-state user-modify-playback-state",
        });

        window.location.href = "https://accounts.spotify.com/authorize?" + params.toString();
      };

      const loginGoogle = () => {
        if (!window.google?.accounts?.oauth2) {
          alert("Google Identity Services has not loaded yet. Please try again.");
          return;
        }

        window.google.accounts.oauth2
          .initTokenClient({
            client_id: GOOGLE_CLIENT_ID,
            scope: GOOGLE_SCOPES,
            callback: (r) => {
              if (r?.access_token) {
                setGoogleToken(r.access_token);
                localStorage.setItem("zen_google_token", r.access_token);
              }
            },
          })
          .requestAccessToken();
      };

      const toggleFullscreen = () => {
        const next = !isFullscreenMode;
        setIsFullscreenMode(next);
        localStorage.setItem("zen_fullscreen", String(next));
      };

        googleToken,
        spotifyToken,
        weatherData,
        viewDate,
        habits,
        events,
        tasks,
        locationLabel,

        onNavigate: setActiveTab,
        onMonthChange: setViewDate,
        onOpenFilter: () => setIsCalFilterOpen(true),

          const completions = habit.completions || [];
          const nextCompletions = completions.includes(dateStr)
            ? completions.filter((c) => c !== dateStr)
            : [...completions, dateStr];

          updateHabitInCloud(id, { completions: nextCompletions });

        onDateClick: (dayEvents, date) => {

          setSelectedDayDate(date);
        },
        onToggleTask: (id) => {

          fetch("https://www.googleapis.com/tasks/v1/lists/@default/tasks/" + id, {

            headers: {
              Authorization: "Bearer " + googleToken,
              "Content-Type": "application/json",

            body: JSON.stringify({ status: "completed" }),

        onLogin: loginSpotify,
      };

        return h(

          layoutItems.map((item) =>
            h(

              {

              },
              h(item.component, sharedProps)
            )
          )
        );
      };

      const renderWeather = () =>
        h(
          "div",
          { className: "glass-card p-10 min-h-[500px]" },
          h(
            "div",
            { className: "mb-12" },
            h("h2", { className: "serif text-4xl mb-2 text-stone-800 dark:text-stone-100" }, "Weather"),
            h(
              "p",
              { className: "text-[12px] text-stone-300 dark:text-stone-700 uppercase tracking-[0.4em] font-bold" },
              locationLabel + ", California"
            )
          ),
          weatherData &&
            h(
              "div",
              { className: "grid grid-cols-1 lg:grid-cols-2 gap-8" },
              h(
                "div",
                {
                  className:
                    "p-8 bg-stone-50/50 dark:bg-stone-900/30 rounded-[32px] border border-stone-100 dark:border-white/5",
                },
                h(
                  "div",
                  { className: "flex items-center gap-6 mb-8" },
                  h(WeatherIcon, {
                    code: weatherData.current.weather_code,
                    className: "w-20 h-20",
                  }),
                  h(
                    "div",
                    null,
                    h(
                      "div",
                      { className: "text-6xl font-light serif text-stone-800 dark:text-stone-100" },
                      Math.round(weatherData.current.temperature_2m) + "°"
                    ),
                    h(
                      "p",
                      { className: "text-lg text-stone-500 dark:text-stone-400 serif italic" },
                      WEATHER_CODES[weatherData.current.weather_code]
                    )
                  )
                ),
                h(
                  "div",
                  { className: "grid grid-cols-2 gap-6 pt-6 border-t border-stone-100 dark:border-stone-800" },
                  h(
                    "div",
                    null,
                    h("p", { className: "text-[10px] text-stone-300 dark:text-stone-700 uppercase font-black mb-1" }, "Feels Like"),

                  ),
                  h(

                    null,
                    h("p", { className: "text-[10px] text-stone-300 dark:text-stone-700 uppercase font-black mb-1" }, "Wind Speed"),
                    h(

              h(

                      )
                    ),
                    h(

          { className: "glass-card p-10 min-h-[500px]" },
          h(

            { className: "flex justify-between items-end mb-12" },
            h(

              null,
              h("h2", { className: "serif text-4xl mb-2 text-stone-800 dark:text-stone-100" }, "Daily Rhythms"),
              h(
                "p",
                { className: "text-[12px] text-stone-300 font-bold uppercase tracking-widest" },

            ),
            !showHabitForm &&
              h(

        h(
          "div",
          { className: "glass-card p-10 min-h-[500px] overflow-y-auto" },
          h("h2", { className: "serif text-4xl mb-12 text-stone-800 dark:text-stone-100" }, "Timeline"),
          h(
            "div",
            { className: "space-y-6" },
            events.filter((e) => new Date(e.rawDate) >= new Date()).length > 0
              ? events
                  .filter((e) => new Date(e.rawDate) >= new Date())
                  .map((e, i) =>
                    h(
                      "div",
                      {
                        key: i,
                        className:
                          "p-8 bg-stone-50/50 dark:bg-stone-900/30 rounded-[32px] border border-stone-100 dark:border-white/5 shadow-sm",
                      },
                      h(
                        "div",
                        { className: "flex justify-between items-start mb-2" },
                        h(
                          "div",
                          null,
                          h(
                            "p",
                            {
                              className:
                                "text-[10px] font-bold text-stone-400 dark:text-stone-500 uppercase tracking-widest mb-1",
                            },
                            new Date(e.rawDate).toLocaleDateString("en-US", {
                              weekday: "long",
                              month: "short",
                              day: "numeric",
                            })
                          ),
                          h(
                            "span",
                            { className: "text-xl font-semibold text-stone-800 dark:text-stone-100" },
                            e.title
                          )
                        ),
                        h(
                          "span",
                          {
                            className:
                              "text-xs font-bold text-stone-400 dark:text-stone-600 uppercase tracking-widest",
                          },
                          e.time
                        )
                      ),
                      e.location &&
                        h(
                          "div",
                          { className: "flex items-center gap-2 text-xs text-stone-500 dark:text-stone-400 mt-2 mb-4" },
                          h("span", null, "📍"),
                          h("span", null, e.location)
                        ),
                      e.notes &&
                        h(
                          "div",
                          {
                            className:
                              "text-sm text-stone-400 dark:text-stone-500 leading-relaxed border-t border-stone-100 dark:border-stone-800/50 pt-4 mt-2 serif italic",
                          },
                          e.notes.replace(/<[^>]*>?/gm, "")
                        )
                    )
                  )
              : h("p", { className: "italic text-stone-300" }, "No upcoming events found.")
          )
        );

      const getPageContent = () => {
        if (activeTab === "home") return renderHome();
        if (activeTab === "weather") return renderWeather();
        if (activeTab === "habits") return renderHabits();
        return renderTimeline();
      };

      return h(
        "div",
        {
          className:
            "p-5 md:p-12 max-w-7xl mx-auto flex flex-col transition-all " +
            (isFullscreenMode ? "h-screen overflow-hidden" : "min-h-screen"),
        },
        h(SleepModeOverlay, {
          isActive: isIdle,
          spotifyToken,
          onExit: () => setIsIdle(false),
          onLogin: loginSpotify,
        }),
        h(DayDetailModal, {
          events: selectedDayEvents || [],
          date: selectedDayDate,
          onClose: () => {
            setSelectedDayEvents(null);
            setSelectedDayDate(null);
          },
        }),
        isCalFilterOpen &&
          h(CalendarFilterModal, {
            calendars,
            selectedIds: selectedCalIds,
            onToggle: (id) => {
              const next = selectedCalIds.includes(id)
                ? selectedCalIds.filter((x) => x !== id)
                : [...selectedCalIds, id];
              setSelectedCalIds(next);
              localStorage.setItem("zen_selected_calendars", JSON.stringify(next));
            },
            onClose: () => setIsCalFilterOpen(false),
          }),
        h(
          "header",
          {
            className:
              "flex justify-between items-center mb-6 bg-white/50 dark:bg-stone-900/50 border border-stone-200/60 p-3 px-5 rounded-[32px] shadow-sm flex-shrink-0",
          },
          h(
            "div",
            { className: "flex gap-2" },
            ["home", "weather", "habits", "timeline"].map((tab) =>
              h(
                "button",
                {
                  key: tab,
                  onClick: () => setActiveTab(tab),
                  className:
                    "text-[10px] font-bold px-5 py-2.5 rounded-2xl transition-all " +
                    (activeTab === tab
                      ? "bg-stone-800 text-white shadow-md"
                      : "text-stone-400 hover:text-stone-700 uppercase"),
                },
                tab
              )
            )
          ),
          h(
            "div",
            { className: "flex items-center gap-6" },
            h(
              "div",
              { className: "flex items-center gap-3 border-r border-stone-200 dark:border-stone-800 pr-6" },
              h(
                "button",
                {
                  onClick: toggleFullscreen,
                  className:
                    "p-2 rounded-xl transition-all " +
                    (isFullscreenMode
                      ? "bg-stone-800 text-white shadow-lg"
                      : "text-stone-300 hover:text-stone-800"),
                },
                h(
                  "svg",
                  { width: 18, height: 18, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: 2.5 },
                  h("path", {
                    d: isFullscreenMode
                      ? "M4 14h6v6m10-6h-6v6M4 10h6V4m10 6h-6V4"
                      : "M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3",
                  })
                )
              ),
              h(
                "button",
                {
                  onClick: () => setIsIdle(true),
                  className: "p-2 text-stone-300 hover:text-stone-800",
                },
                h(
                  "svg",
                  { width: 18, height: 18, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: 2.5 },
                  h("path", {
                    d: "m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z",
                  })
                )
              )
            ),
            h(ThemeToggle, {
              isDarkMode,
              onToggle: () => setIsDarkMode(!isDarkMode),
            }),
            h(
              "div",
              { className: "flex items-center gap-2" },
              !googleToken &&
                h(
                  "button",
                  {
                    onClick: loginGoogle,
                    className:
                      "text-[10px] font-bold bg-white text-stone-900 dark:bg-stone-950 dark:text-white border border-stone-200 dark:border-stone-700 px-5 py-2.5 rounded-2xl shadow-sm hover:bg-stone-50 transition-all",
                  },
                  "GOOGLE"
                ),
              !spotifyToken &&
                h(
                  "button",
                  {
                    onClick: loginSpotify,
                    className:
                      "text-[10px] font-bold bg-white text-stone-900 dark:bg-stone-950 dark:text-white border border-stone-200 dark:border-stone-700 px-5 py-2.5 rounded-2xl shadow-sm hover:bg-stone-50 transition-all",
                  },
                  "SPOTIFY"
                )
            )
          )
        ),
        getPageContent(),
        h(
          "footer",
          {
            className:
              "py-6 mt-auto text-center text-[10px] text-stone-200 dark:text-stone-950 uppercase font-black tracking-[0.7em] flex-shrink-0 " +
              (isFullscreenMode ? "hidden" : ""),
          },
          "Zen Workspace • Balance"
        )
      );
    }

    try {
      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(h(App));
    } catch (err) {
      console.error("App failed to render:", err);
      const loader = document.getElementById("loader");
      if (loader) loader.style.display = "none";
      const root = document.getElementById("root");
      root.innerHTML =
        '<div style="padding:32px;font-family:Inter,sans-serif;color:#7f1d1d;">' +
        "<h1>App failed to load</h1>" +
        "<p>Open DevTools console to see the error.</p>" +
        "</div>";
    }
  </script>
</body>
</html>
