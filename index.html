<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <title>Zen Dashboard</title>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=Lora:ital,wght@0,400;1,400&display=swap"
    rel="stylesheet"
  />

  <script>
    tailwind.config = {
      darkMode: "class",
    };
  </script>

  <style>
    body {
      font-family: "Inter", sans-serif;
      transition: background-color 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      overflow-x: hidden;
      margin: 0;
    }

    body.light {
      background-color: #fdfaf7;
      color: #4a3f35;
    }

    body.dark {
      background-color: #0d0d0c;
      color: #f4f4f5;
    }

    .serif { font-family: "Lora", serif; }

    .glass-card {
      backdrop-filter: blur(16px);
      border-radius: 28px;
      overflow: hidden;
      position: relative;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .light .glass-card {
      background: rgba(255, 255, 255, 0.85);
      border: 1px solid rgba(180, 150, 110, 0.15);
      box-shadow: 0 4px 24px -6px rgba(0, 0, 0, 0.04);
    }

    .dark .glass-card {
      background: rgba(26, 26, 24, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 12px 40px -12px rgba(0, 0, 0, 0.6);
    }

    .no-scrollbar::-webkit-scrollbar { display: none; }

    #loader {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.5s;
      background: #fdfaf7;
    }

    body.dark #loader { background: #0d0d0c; }

    .spinner {
      width: 28px;
      height: 28px;
      border: 2.5px solid transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      border-top-color: #4a3f35;
      border-right-color: #e5e0d8;
    }

    body.dark .spinner {
      border-top-color: #f4f4f5;
      border-right-color: #3f3f3c;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .habit-dot {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      font-weight: 800;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
      border: 1.5px solid transparent;
    }

    .habit-dot.active {
      background-color: #10b981;
      color: white;
      box-shadow: 0 4px 10px -2px rgba(16, 185, 129, 0.25);
    }

    .dark .habit-dot.active {
      background-color: #34d399;
      color: #064e3b;
      box-shadow: 0 0 15px rgba(52, 211, 153, 0.4);
    }

    .habit-dot.inactive {
      background-color: transparent;
      border-color: #e5e7eb;
      color: #9ca3af;
    }

    .dark .habit-dot.inactive {
      border-color: #262624;
      color: #4b5563;
    }

    .habit-dot.today {
      border-color: #10b981;
      border-width: 2px;
    }

    .dark .habit-dot.today { border-color: #34d399; }

    @keyframes sun-glow {
      0%, 100% { transform: scale(1); opacity: 0.9; }
      50% { transform: scale(1.1); opacity: 1; }
    }

    @keyframes ray-rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes rain-drop {
      0% { transform: translateY(-20px); opacity: 0; }
      50% { opacity: 1; }
      100% { transform: translateY(120px); opacity: 0; }
    }

    @keyframes cloud-move {
      0% { transform: translateX(-20px); }
      100% { transform: translateX(20px); }
    }

    @keyframes vinyl-spin {
      from { transform: translateY(-50%) rotate(0deg); }
      to { transform: translateY(-50%) rotate(360deg); }
    }

    .animate-sun-glow { animation: sun-glow 4s ease-in-out infinite; }
    .animate-ray-rotate { animation: ray-rotate 30s linear infinite; }
    .animate-rain-drop { animation: rain-drop 1s linear infinite; }
    .animate-cloud-move { animation: cloud-move 6s ease-in-out infinite alternate; }

    .vinyl-record {
      position: absolute;
      top: 50%;
      right: -14%;
      transform: translateY(-50%);
      border-radius: 9999px;
      box-shadow:
        0 30px 70px rgba(0,0,0,0.45),
        inset 0 0 0 1px rgba(255,255,255,0.06);
    }

    .vinyl-record.spinning {
      animation: vinyl-spin 3.6s linear infinite;
    }

    .vinyl-grooves {
      position: absolute;
      inset: 6%;
      border-radius: 9999px;
      background:
        repeating-radial-gradient(
          circle,
          rgba(255,255,255,0.05) 0px,
          rgba(255,255,255,0.05) 1px,
          rgba(0,0,0,0) 2px,
          rgba(0,0,0,0) 6px
        );
      opacity: 0.28;
      pointer-events: none;
    }

    .spotify-feather {
      -webkit-mask-image: linear-gradient(to top, black 0%, black 68%, transparent 100%);
      mask-image: linear-gradient(to top, black 0%, black 68%, transparent 100%);
    }

    .sleep-overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: #0d0d0c;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .sleep-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .sleep-content {
      transform: translateY(30px);
      opacity: 0;
      transition: all 1s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s;
    }

    .sleep-overlay.active .sleep-content {
      transform: translateY(0);
      opacity: 1;
    }

    .task-checkbox {
      width: 18px;
      height: 18px;
      border: 1.5px solid #d1d5db;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .dark .task-checkbox { border-color: #3f3f3c; }
    .task-checkbox.checked {
      background-color: #10b981;
      border-color: #10b981;
    }

    .photo-card {
      height: 100%;
      min-height: 220px;
    }

    .auth-pill {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 20;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-radius: 9999px;
      padding: 6px 10px;
      backdrop-filter: blur(10px);
      background: rgba(0,0,0,0.35);
      color: rgba(255,255,255,0.9);
      border: 1px solid rgba(255,255,255,0.12);
    }

    .settings-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 20px 0;
      border-top: 1px solid rgba(120,120,120,0.12);
    }

    .settings-row:first-child { border-top: none; }

    .settings-badge {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border-radius: 9999px;
      padding: 7px 12px;
    }

    .settings-badge.ok {
      background: rgba(16,185,129,0.12);
      color: #10b981;
    }

    .settings-badge.warn {
      background: rgba(245,158,11,0.12);
      color: #f59e0b;
    }
  </style>
</head>
<body class="light">
  <div id="loader"><div class="spinner"></div></div>
  <div id="root"></div>
<script type="module">
/* --- YOUR ORIGINAL IMPORTS --- */
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
import {
  getAuth,
  onAuthStateChanged,
  signInAnonymously,
  signInWithCustomToken,
} from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
import {
  getFirestore,
  doc,
  setDoc,
  getDoc,
  collection,
  onSnapshot,
  updateDoc,
  deleteDoc,
} from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

const { useState, useEffect, useMemo, useCallback, useRef, createElement: h } = React;

/* --- SAME CONSTANTS --- */
const FIREBASE_CONFIG = null;
const app = FIREBASE_CONFIG ? initializeApp(FIREBASE_CONFIG) : null;
const auth = app ? getAuth(app) : null;
const db = app ? getFirestore(app) : null;
const appId = "zen-productivity-dashboard";

/* ---------- FIXED HELPERS ---------- */
function nowMs() { return Date.now(); }

function safeJSONParse(value, fallback) {
  try { return JSON.parse(value); } catch { return fallback; }
}

/* ---------- APP ---------- */
function App() {
  const [isDarkMode, setIsDarkMode] = useState(localStorage.getItem("zen_theme") === "dark");
  const [isFullscreenMode, setIsFullscreenMode] = useState(localStorage.getItem("zen_fullscreen") === "true");

  /* ✅ NEW: mobile detection */
  const [isMobile, setIsMobile] = useState(window.innerWidth < 768);

  useEffect(() => {
    const handleResize = () => setIsMobile(window.innerWidth < 768);
    window.addEventListener("resize", handleResize);
    return () => window.removeEventListener("resize", handleResize);
  }, []);

  /* ---------- EXISTING STATE ---------- */
  const [habits, setHabits] = useState(safeJSONParse(localStorage.getItem("zen_habits_v1") || "[]", []));

  /* ---------- THEME ---------- */
  useEffect(() => {
    document.body.className = isDarkMode ? "dark" : "light";
    localStorage.setItem("zen_theme", isDarkMode ? "dark" : "light");
  }, [isDarkMode]);

  const toggleFullscreen = () => {
    const next = !isFullscreenMode;
    setIsFullscreenMode(next);
    localStorage.setItem("zen_fullscreen", String(next));
  };

  /* ---------- WIDGETS (minimal example, your originals still work) ---------- */

  function ClockWidget() {
    const [now, setNow] = useState(new Date());
    useEffect(() => {
      const t = setInterval(() => setNow(new Date()), 1000);
      return () => clearInterval(t);
    }, []);
    return h("div", { className: "p-6 flex items-center justify-center h-full" },
      h("div", { className: "text-center" },
        h("div", { className: "text-5xl font-light" },
          now.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })
        ),
        h("div", { className: "text-xs mt-2 opacity-50" },
          now.toLocaleDateString()
        )
      )
    );
  }

  function NotesWidget() {
    const [note, setNote] = useState(localStorage.getItem("zen_note") || "");
    return h("textarea", {
      value: note,
      onChange: (e) => {
        setNote(e.target.value);
        localStorage.setItem("zen_note", e.target.value);
      },
      className: "w-full h-full p-4 bg-transparent resize-none outline-none"
    });
  }

  function PhotoWidget() {
    return h("div", {
      className: "w-full h-full bg-cover bg-center",
      style: { backgroundImage: "url(https://images.unsplash.com/photo-1506905925346-21bda4d32df4)" }
    });
  }

  /* ---------- LAYOUT ---------- */

  const layoutItems = [
    { id: "clock", component: ClockWidget },
    { id: "notes", component: NotesWidget },
    { id: "photo", component: PhotoWidget },
  ];

  /* ✅ MOBILE PRIORITY */
  const mobileOrder = ["clock", "notes", "photo"];

  const orderedItems = isFullscreenMode && isMobile
    ? mobileOrder.map(id => layoutItems.find(i => i.id === id)).filter(Boolean)
    : layoutItems;

  /* ✅ FIXED sizing */
  const fsClass = isFullscreenMode
    ? "h-full min-h-0"
    : "min-h-[220px]";

  /* ✅ FULLSCREEN GRID LOGIC */
  const gridClass = isFullscreenMode
    ? isMobile
      ? "grid grid-cols-1 grid-rows-3 gap-3 h-full"
      : "grid grid-cols-3 grid-rows-1 gap-6 h-full"
    : "grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 flex-1";

  const cardPadding = isFullscreenMode && isMobile ? "p-2" : "";

  /* ---------- RENDER ---------- */

  return h("div", {
    className:
      "p-3 md:p-12 max-w-7xl mx-auto flex flex-col transition-all " +
      (isFullscreenMode
        ? "h-[100dvh] overflow-hidden"
        : "min-h-screen"),
  },

    /* HEADER */
    h("div", { className: "flex justify-between mb-6" },
      h("button", {
        onClick: toggleFullscreen,
        className: "px-4 py-2 bg-stone-800 text-white rounded-xl text-xs font-bold"
      }, isFullscreenMode ? "EXIT FULLSCREEN" : "FULLSCREEN"),

      h("button", {
        onClick: () => setIsDarkMode(!isDarkMode),
        className: "px-4 py-2 bg-stone-200 dark:bg-stone-800 rounded-xl text-xs font-bold"
      }, "THEME")
    ),

    /* GRID */
    h("div", { className: gridClass },
      orderedItems.map((item) =>
        h("div", {
            key: item.id,
            className: "glass-card " + fsClass + " " + cardPadding,
          },
          h(item.component)
        )
      )
    )
  );
}

/* ---------- RENDER ---------- */
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(h(App));
setTimeout(() => {
  const loader = document.getElementById("loader");
  if (loader) loader.style.display = "none";
}, 1000);
</script>
 
</body>
</html>
