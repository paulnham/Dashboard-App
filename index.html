<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <title>Dayboard</title>

  <link rel="icon" type="image/png" sizes="32x32" href="./icons/dayboard-32.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="./icons/dayboard-192.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="./icons/dayboard-180.png" />
  <meta name="theme-color" content="#0d0d0c" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Dayboard" />
  <link rel="manifest" href="./manifest.webmanifest" />

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=Lora:ital,wght@0,400;1,400&display=swap"
    rel="stylesheet"
  />

  <script>
    tailwind.config = {
      darkMode: "class",
    };
  </script>

  <style>
    body {
      font-family: "Inter", sans-serif;
      transition: background-color 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      overflow-x: hidden;
      margin: 0;
    }

    body.light {
      background-color: #050505;
      color: #f4f4f5;
    }

    body.dark {
      background-color: #050505;
      color: #f4f4f5;
    }

    .serif { font-family: "Lora", serif; }

    .glass-card {
      backdrop-filter: blur(16px);
      border-radius: 28px;
      overflow: hidden;
      position: relative;
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      background: rgba(17, 17, 15, 0.88);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 12px 40px -12px rgba(0, 0, 0, 0.6);
    }

    .no-scrollbar::-webkit-scrollbar { display: none; }

    #loader {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.5s;
      background: #050505;
    }

    .spinner {
      width: 28px;
      height: 28px;
      border: 2.5px solid transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      border-top-color: #f4f4f5;
      border-right-color: #3f3f3c;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .habit-dot {
      width: 24px;
      height: 24px;
      border-radius: 9999px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      font-weight: 800;
      transition: all 0.2s ease;
      cursor: pointer;
      border: 1.5px solid #262624;
      color: #4b5563;
      background: transparent;
    }

    .habit-dot.active {
      background-color: #34d399;
      color: #03271c;
      border-color: #34d399;
      box-shadow: 0 0 18px rgba(52, 211, 153, 0.34);
    }

    .habit-dot.today {
      border-color: #34d399;
      border-width: 2px;
    }

    .task-checkbox {
      width: 18px;
      height: 18px;
      border: 1.5px solid #3f3f3c;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: transparent;
    }

    .task-checkbox.checked {
      background-color: #10b981;
      border-color: #10b981;
      color: white;
    }

    .photo-card {
      height: 100%;
      min-height: 220px;
    }

    .settings-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 20px 0;
      border-top: 1px solid rgba(120,120,120,0.12);
    }

    .settings-row:first-child { border-top: none; }

    .settings-badge {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border-radius: 9999px;
      padding: 7px 12px;
    }

    .settings-badge.ok {
      background: rgba(16,185,129,0.12);
      color: #34d399;
    }

    .settings-badge.warn {
      background: rgba(245,158,11,0.12);
      color: #f59e0b;
    }

    .sleep-overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: #050505;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .sleep-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .sleep-content {
      transform: translateY(30px);
      opacity: 0;
      transition: all 1s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s;
    }

    .sleep-overlay.active .sleep-content {
      transform: translateY(0);
      opacity: 1;
    }

    .photo-slide-layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition:
        transform 700ms cubic-bezier(0.22, 1, 0.36, 1),
        opacity 700ms cubic-bezier(0.22, 1, 0.36, 1),
        filter 700ms cubic-bezier(0.22, 1, 0.36, 1);
      will-change: transform, opacity;
      filter: grayscale(10%) brightness(0.72);
    }

    .photo-slide-current {
      transform: translateX(0%);
      opacity: 1;
      z-index: 2;
    }

    .photo-slide-enter-right {
      transform: translateX(100%);
      opacity: 1;
      z-index: 3;
    }

    .photo-slide-enter-active {
      transform: translateX(0%);
      opacity: 1;
      z-index: 3;
    }

    .photo-slide-exit-left {
      transform: translateX(-100%);
      opacity: 1;
      z-index: 2;
    }
  </style>
</head>
<body class="dark">
  <div id="loader"><div class="spinner"></div></div>
  <div id="root"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAnalytics, isSupported } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-analytics.js";
    import {
      getAuth,
      onAuthStateChanged,
      signInWithCustomToken,
      GoogleAuthProvider,
      signInWithPopup,
      signOut,
    } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import {
      getFirestore,
      doc,
      setDoc,
      getDoc,
      collection,
      onSnapshot,
      updateDoc,
      deleteDoc,
    } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const { useState, useEffect, useCallback, useMemo, useRef, createElement: h } = React;

    const FIREBASE_CONFIG = {
      apiKey: "AIzaSyAFoFYFNtDP-csMVqfFsrjTaqTEdzbAU5g",
      authDomain: "dashboard-app-c14b8.firebaseapp.com",
      projectId: "dashboard-app-c14b8",
      storageBucket: "dashboard-app-c14b8.firebasestorage.app",
      messagingSenderId: "772173035664",
      appId: "1:772173035664:web:f043903ed3aa45cfb90015",
      measurementId: "G-FYH26DB5V0"
    };

    const GOOGLE_CLIENT_ID = "719863282782-9dnqtj2r6msq1d9cohf70gike1idq565.apps.googleusercontent.com";
    const GOOGLE_SCOPES =
      "https://www.googleapis.com/auth/calendar.readonly " +
      "https://www.googleapis.com/auth/tasks " +
      "https://www.googleapis.com/auth/photospicker.mediaitems.readonly";

    const PHOTOS = [
      "https://images.unsplash.com/photo-1541364983171-a8ba01d95cfc?w=1000&q=80",
      "https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1000&q=80",
      "https://images.unsplash.com/photo-1476514525535-07fb3b4ae5f1?w=1000&q=80",
      "https://images.unsplash.com/photo-1493246507139-91e8fad9978e?w=1000&q=80",
    ];

    const WEATHER_CODES = {
      0: "Clear Sky", 1: "Mainly Clear", 2: "Partly Cloudy", 3: "Overcast",
      45: "Fog", 48: "Depositing Rime Fog", 51: "Light Drizzle", 53: "Moderate Drizzle",
      55: "Dense Drizzle", 61: "Slight Rain", 63: "Moderate Rain", 65: "Heavy Rain",
      71: "Slight Snow", 73: "Moderate Snow", 75: "Heavy Snow", 77: "Snow Grains",
      80: "Slight Rain Showers", 81: "Moderate Rain Showers", 82: "Violent Rain Showers",
      95: "Thunderstorm", 96: "Thunderstorm with Hail", 99: "Thunderstorm with Heavy Hail"
    };

    const app = initializeApp(FIREBASE_CONFIG);
    const auth = getAuth(app);
    const googleProvider = new GoogleAuthProvider();
    const db = getFirestore(app);
    const appId = "zen-productivity-dashboard";

    let analytics = null;
    isSupported().then((supported) => {
      if (supported) analytics = getAnalytics(app);
    }).catch(() => {});

    function nowMs() { return Date.now(); }

    function safeJSONParse(value, fallback) {
      try { return JSON.parse(value); } catch { return fallback; }
    }

    function parseLocalDate(dateStr) {
      return new Date(dateStr + "T00:00:00");
    }

    function getTodayStr() {
      return new Date().toISOString().split("T")[0];
    }

    function getStartOfWeek() {
      const now = new Date();
      const day = now.getDay();
      const diff = now.getDate() - day + (day === 0 ? -6 : 1);
      const start = new Date(now);
      start.setDate(diff);
      start.setHours(0, 0, 0, 0);
      return start;
    }

    function loadLocalHabits() {
      return safeJSONParse(localStorage.getItem("zen_habits_v1") || "[]", []);
    }

    function saveLocalHabits(habits) {
      localStorage.setItem("zen_habits_v1", JSON.stringify(habits));
    }

    function loadGoogleAuth() {
      return safeJSONParse(localStorage.getItem("zen_google_auth") || "null", null);
    }

    function saveGoogleAuth(authObj) {
      localStorage.setItem("zen_google_auth", JSON.stringify(authObj));
      if (authObj?.access_token) localStorage.setItem("zen_google_token", authObj.access_token);
      else localStorage.removeItem("zen_google_token");
    }

    function clearGoogleAuth() {
      localStorage.removeItem("zen_google_auth");
      localStorage.removeItem("zen_google_token");
    }

    function loadPhotoTransitionInterval() {
      return localStorage.getItem("dayboard_photo_transition_interval") || "manual";
    }

    function savePhotoTransitionInterval(value) {
      localStorage.setItem("dayboard_photo_transition_interval", value);
    }

    function loadLocalSettings() {
      return safeJSONParse(localStorage.getItem("zen_dashboard_settings_v1") || "{}", {});
    }

    function saveLocalSettings(settings) {
      localStorage.setItem("zen_dashboard_settings_v1", JSON.stringify(settings));
    }

    function loadLocalPhotosSelection() {
      return safeJSONParse(localStorage.getItem("dayboard_google_photos_selection") || "[]", []);
    }

    function saveLocalPhotosSelection(items) {
      localStorage.setItem("dayboard_google_photos_selection", JSON.stringify(items || []));
    }

    function clearLocalPhotosSelection() {
      localStorage.removeItem("dayboard_google_photos_selection");
    }

    function loadLocalNote() {
      return localStorage.getItem("zen_note") || "";
    }

    function saveLocalNote(value) {
      localStorage.setItem("zen_note", value);
    }

    function ThemeToggle({ isDarkMode, onToggle }) {
      return h(
        "div",
        {
          onClick: onToggle,
          className: "w-[54px] h-[30px] bg-stone-800 rounded-full relative cursor-pointer transition-all flex items-center px-1",
        },
        h(
          "div",
          {
            className:
              "w-[22px] h-[22px] bg-stone-950 rounded-full flex items-center justify-center shadow transition-all transform " +
              (isDarkMode ? "translate-x-6" : "translate-x-0"),
          },
          isDarkMode
            ? h(
                "svg",
                { width: 12, height: 12, viewBox: "0 0 24 24", fill: "none", stroke: "#fbbf24", strokeWidth: 3 },
                h("path", { d: "M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" })
              )
            : h(
                "svg",
                { width: 12, height: 12, viewBox: "0 0 24 24", fill: "none", stroke: "#6b7280", strokeWidth: 3 },
                h("circle", { cx: 12, cy: 12, r: 5 }),
                h("path", { d: "M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" })
              )
        )
      );
    }

    function WeatherIcon({ code, className = "w-6 h-6" }) {
      const isClear = code === 0 || code === 1;
      const isCloudy = code === 2 || code === 3 || code === 45 || code === 48;
      const isRain = [51, 53, 55, 61, 63, 65, 80, 81, 82, 95, 96, 99].includes(code);
      const isSnow = [71, 73, 75, 77].includes(code);

      const color = isClear
        ? "text-amber-400"
        : isRain
        ? "text-sky-400"
        : isSnow
        ? "text-slate-300"
        : "text-stone-400";

      if (isClear) {
        return h(
          "svg",
          {
            className: `${className} ${color}`,
            viewBox: "0 0 24 24",
            fill: "none",
            stroke: "currentColor",
            strokeWidth: 2,
            strokeLinecap: "round",
            strokeLinejoin: "round",
          },
          h("circle", { cx: 12, cy: 12, r: 5 }),
          h("path", { d: "M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" })
        );
      }

      if (isCloudy) {
        return h(
          "svg",
          {
            className: `${className} ${color}`,
            viewBox: "0 0 24 24",
            fill: "none",
            stroke: "currentColor",
            strokeWidth: 2,
            strokeLinecap: "round",
            strokeLinejoin: "round",
          },
          h("path", { d: "M17.5 19c2.5 0 4.5-2 4.5-4.5 0-2.4-1.9-4.3-4.3-4.5C16.9 6.8 14 4.5 10.5 4.5c-3.6 0-6.5 2.8-6.5 6.3 0 .1 0 .2.1.3C1.8 11.5 0 13.5 0 15.8 0 18.1 1.8 20 4 20h13.5" })
        );
      }

      if (isRain) {
        return h(
          "svg",
          {
            className: `${className} ${color}`,
            viewBox: "0 0 24 24",
            fill: "none",
            stroke: "currentColor",
            strokeWidth: 2,
            strokeLinecap: "round",
            strokeLinejoin: "round",
          },
          h("path", { d: "M7 17h10a4 4 0 0 0 .2-8A6 6 0 0 0 6.3 9.1 3.5 3.5 0 0 0 7 17z" }),
          h("path", { d: "M9 19l-1 2" }),
          h("path", { d: "M13 19l-1 2" }),
          h("path", { d: "M17 19l-1 2" })
        );
      }

      if (isSnow) {
        return h(
          "svg",
          {
            className: `${className} ${color}`,
            viewBox: "0 0 24 24",
            fill: "none",
            stroke: "currentColor",
            strokeWidth: 2,
            strokeLinecap: "round",
            strokeLinejoin: "round",
          },
          h("path", { d: "M7 16h10a4 4 0 0 0 .2-8A6 6 0 0 0 6.3 8.1 3.5 3.5 0 0 0 7 16z" }),
          h("path", { d: "M9 19h.01" }),
          h("path", { d: "M12 21h.01" }),
          h("path", { d: "M15 19h.01" })
        );
      }

      return h(
        "svg",
        {
          className: `${className} ${color}`,
          viewBox: "0 0 24 24",
          fill: "none",
          stroke: "currentColor",
          strokeWidth: 2,
        },
        h("circle", { cx: 12, cy: 12, r: 10 })
      );
    }

    function WeatherAnimation({ code }) {
      const isClear = code === 0 || code === 1;
      const isCloudy = code === 2 || code === 3 || code === 45 || code === 48;
      const isRain = [51, 53, 55, 61, 63, 65, 80, 81, 82, 95, 96, 99].includes(code);
      const isSnow = [71, 73, 75, 77].includes(code);

      return h(
        "div",
        { className: "absolute inset-0 flex items-center justify-center overflow-hidden" },

        isClear &&
          h(
            "div",
            { className: "absolute inset-0 flex items-center justify-center bg-gradient-to-br from-amber-500/10 to-transparent" },
            h(
              "div",
              { className: "relative w-28 h-28" },
              h("div", { className: "absolute inset-0 bg-amber-400 rounded-full shadow-[0_0_80px_rgba(251,191,36,0.5)]" }),
              [0, 45, 90, 135, 180, 225, 270, 315].map((deg) =>
                h("div", {
                  key: deg,
                  className: "absolute top-1/2 left-1/2 w-2 h-10 bg-amber-500/60 rounded-full origin-bottom",
                  style: { transform: "translate(-50%, -100%) rotate(" + deg + "deg) translateY(-40px)" },
                })
              )
            )
          ),

        isCloudy &&
          h(
            "div",
            { className: "absolute inset-0 flex items-center justify-center" },
            h("div", { className: "absolute top-1/4 left-1/4 w-40 h-24 bg-stone-300/20 rounded-full blur-2xl opacity-80" }),
            h("div", { className: "absolute top-1/2 right-1/4 w-48 h-28 bg-stone-400/15 rounded-full blur-3xl opacity-70" }),
            h(
              "div",
              { className: "relative z-10 flex flex-col items-center gap-3" },
              h(WeatherIcon, { code, className: "w-16 h-16" }),
              h("p", { className: "text-[11px] font-bold uppercase tracking-[0.25em] text-stone-500" }, WEATHER_CODES[code] || "Cloudy")
            )
          ),

        isRain &&
          h(
            "div",
            { className: "absolute inset-0 flex items-center justify-center" },
            h(
              "div",
              { className: "relative z-10 flex flex-col items-center gap-3" },
              h(WeatherIcon, { code: 63, className: "w-16 h-16" }),
              h("p", { className: "text-[11px] font-bold uppercase tracking-[0.25em] text-sky-400" }, WEATHER_CODES[code] || "Rain")
            )
          ),

        isSnow &&
          h(
            "div",
            { className: "absolute inset-0 flex items-center justify-center" },
            h(
              "div",
              { className: "relative z-10 flex flex-col items-center gap-3" },
              h(WeatherIcon, { code: 71, className: "w-16 h-16" }),
              h("p", { className: "text-[11px] font-bold uppercase tracking-[0.25em] text-stone-300" }, WEATHER_CODES[code] || "Snow")
            )
          )
      );
    }

    function ClockWidget({ large = false }) {
      const [now, setNow] = useState(new Date());

      useEffect(() => {
        const t = setInterval(() => setNow(new Date()), 1000);
        return () => clearInterval(t);
      }, []);

      const h12 = now.getHours() % 12 || 12;
      const m = now.getMinutes().toString().padStart(2, "0");
      const ampm = now.getHours() >= 12 ? "PM" : "AM";

      return h(
        "div",
        { className: "flex flex-col justify-center h-full " + (large ? "items-center text-center" : "p-7") },
        h(
          "div",
          { className: "flex items-baseline gap-1.5" },
          h(
            "h1",
            { className: (large ? "text-[9rem]" : "text-5xl md:text-6xl") + " font-light serif text-stone-100 leading-none" },
            h12,
            h("span", { className: "text-stone-800 mx-1" }, ":"),
            m
          ),
          h("span", { className: (large ? "text-xl" : "text-sm") + " font-medium text-stone-500 uppercase tracking-tighter" }, ampm)
        ),
        h("p", { className: (large ? "text-xl mt-6" : "text-[11px] mt-2") + " text-stone-500 font-semibold tracking-[0.3em] uppercase" }, now.toLocaleDateString("en-US", { weekday: "long", month: "short", day: "numeric" }))
      );
    }

    function WeatherWidget({ onNavigate, weatherData, locationLabel }) {
      const formatT = (t) => (t !== undefined && t !== null ? Math.round(t) + "°" : "--°");
      const weatherCode = weatherData?.current?.weather_code || 0;

      return h(
        "div",
        {
          className: "h-full flex flex-col md:flex-row cursor-pointer hover:bg-white/[0.02] transition-colors",
          onClick: () => onNavigate("weather"),
        },
        h(
          "div",
          { className: "p-7 flex-1 flex flex-col justify-center min-w-[170px] z-10" },
          h(
            "div",
            { className: "flex justify-between items-start mb-5" },
            h(
              "div",
              null,
              h("div", { className: "text-4xl font-light serif text-stone-100" }, formatT(weatherData?.current?.temperature_2m)),
              h("p", { className: "text-[11px] text-stone-500 font-bold mt-1" }, locationLabel)
            ),
            h(WeatherIcon, { code: weatherCode, className: "w-8 h-8" })
          ),
          h(
            "div",
            { className: "flex items-center gap-6 border-t border-stone-900 pt-5" },
            h(
              "div",
              null,
              h("p", { className: "text-[9px] text-stone-700 uppercase font-bold mb-1" }, "H / L"),
              h("p", { className: "text-[12px] text-stone-400 font-medium" }, formatT(weatherData?.daily?.temperature_2m_max?.[0]) + " / " + formatT(weatherData?.daily?.temperature_2m_min?.[0]))
            ),
            h(
              "div",
              null,
              h("p", { className: "text-[9px] text-stone-700 uppercase font-bold mb-1" }, "Precip"),
              h("p", { className: "text-[12px] text-stone-400 font-medium" }, (weatherData?.daily?.precipitation_probability_max?.[0] || 0) + "%")
            )
          )
        ),
        h(
          "div",
          { className: "hidden md:block w-[45%] relative border-l border-stone-900 bg-gradient-to-br from-stone-900/40 to-stone-800/10 overflow-hidden" },
          h(WeatherAnimation, { code: weatherCode })
        )
      );
    }

    function HabitWidget({ habits = [], onNavigate, onToggleHabitCompletion }) {
      const startOfWeek = getStartOfWeek();

      const weekDays = useMemo(
        () =>
          Array.from({ length: 7 }, (_, i) => {
            const d = new Date(startOfWeek);
            d.setDate(d.getDate() + i);
            const dateStr = d.toISOString().split("T")[0];
            const todayStr = getTodayStr();
            return {
              dateStr,
              label: ["M", "T", "W", "T", "F", "S", "S"][i],
              isToday: dateStr === todayStr,
            };
          }),
        [startOfWeek]
      );

      return h(

    function PhotoWidget({
      googlePhotosItems = [],
      googleAuth,
      onOpenSettings,
      photoTransitionInterval = "manual",
    }) {
      const googlePhotoUrls = (googlePhotosItems || [])
        .filter((item) => item.baseUrl && String(item.mimeType || "").startsWith("image/"))
        .map((item) => item.baseUrl + "=w1600-h1600");

      const sourcePhotos = googlePhotoUrls.length > 0 ? googlePhotoUrls : PHOTOS;
      const usingGooglePhotos = googlePhotoUrls.length > 0;

      const intervalMsMap = {
        "10s": 10000,
        "30s": 30000,
        "1m": 60000,
        "5m": 300000,
      };

      const objectUrlRef = useRef(null);
      const objectUrlPrevRef = useRef(null);
      const transitionTimeoutRef = useRef(null);
      const rafRef = useRef(null);

      const [idx, setIdx] = useState(0);
      const [currentSrc, setCurrentSrc] = useState("");
      const [prevSrc, setPrevSrc] = useState("");
      const [isSliding, setIsSliding] = useState(false);
      const [enterActive, setEnterActive] = useState(false);

      useEffect(() => {
        setIdx(0);
      }, [sourcePhotos.length]);

      useEffect(() => {
        const ms = intervalMsMap[photoTransitionInterval];
        if (!ms || sourcePhotos.length <= 1) return;
        const timer = setInterval(() => {
          setIdx((prev) => (prev + 1) % sourcePhotos.length);
        }, ms);
        return () => clearInterval(timer);
      }, [photoTransitionInterval, sourcePhotos.length]);

      useEffect(() => {
        const revokeUrl = (ref) => {
          if (ref.current) {
            URL.revokeObjectURL(ref.current);
            ref.current = null;
          }
        };

        let cancelled = false;

        const resolveDisplaySrc = async (src) => {
          if (!src) return "";
          if (!usingGooglePhotos) return src;
          if (!googleAuth?.access_token) return "";

          const response = await fetch(src, {
            headers: { Authorization: "Bearer " + googleAuth.access_token },
          });

          if (!response.ok) throw new Error("Google Photos image fetch failed: " + response.status);
          const blob = await response.blob();
          return URL.createObjectURL(blob);
        };

        const loadNextImage = async () => {
          const nextSource = sourcePhotos[idx];
          if (!nextSource) return;

          try {
            const nextDisplaySrc = await resolveDisplaySrc(nextSource);

            if (cancelled) {
              if (nextDisplaySrc && nextDisplaySrc.startsWith("blob:")) URL.revokeObjectURL(nextDisplaySrc);
              return;
            }

            const hadCurrent = !!currentSrc;

            if (!hadCurrent) {
              if (nextDisplaySrc && nextDisplaySrc.startsWith("blob:")) {
                revokeUrl(objectUrlRef);
                objectUrlRef.current = nextDisplaySrc;
              }
              setCurrentSrc(nextDisplaySrc);
              setPrevSrc("");
              setIsSliding(false);
              setEnterActive(false);
              return;
            }

            if (currentSrc.startsWith("blob:")) objectUrlPrevRef.current = currentSrc;
            if (nextDisplaySrc && nextDisplaySrc.startsWith("blob:")) {
              revokeUrl(objectUrlRef);
              objectUrlRef.current = nextDisplaySrc;
            }

            setPrevSrc(currentSrc);
            setCurrentSrc(nextDisplaySrc);
            setIsSliding(false);
            setEnterActive(false);

            if (rafRef.current) cancelAnimationFrame(rafRef.current);
            rafRef.current = requestAnimationFrame(() => {
              rafRef.current = requestAnimationFrame(() => {
                if (cancelled) return;
                setIsSliding(true);
                setEnterActive(true);
              });
            });

            if (transitionTimeoutRef.current) clearTimeout(transitionTimeoutRef.current);
            transitionTimeoutRef.current = setTimeout(() => {
              setPrevSrc("");
              setIsSliding(false);
              setEnterActive(false);
              if (objectUrlPrevRef.current) {
                URL.revokeObjectURL(objectUrlPrevRef.current);
                objectUrlPrevRef.current = null;
              }
            }, 750);
          } catch (err) {
            console.error("Photo load failed:", err);
          }
        };

        loadNextImage();
        return () => { cancelled = true; };
      }, [idx, sourcePhotos.length, usingGooglePhotos, googleAuth?.access_token]);

      useEffect(() => {
        return () => {
          if (transitionTimeoutRef.current) clearTimeout(transitionTimeoutRef.current);
          if (rafRef.current) cancelAnimationFrame(rafRef.current);
          if (objectUrlRef.current) URL.revokeObjectURL(objectUrlRef.current);
          if (objectUrlPrevRef.current) URL.revokeObjectURL(objectUrlPrevRef.current);
        };
      }, []);

      return h(
        "div",
        { className: "relative h-full w-full group photo-card overflow-hidden" },

        prevSrc &&
          h("img", {
            src: prevSrc,
            className: "photo-slide-layer " + (isSliding ? "photo-slide-exit-left" : "photo-slide-current"),
          }),

        currentSrc &&
          h("img", {
            src: currentSrc,
            className: "photo-slide-layer " + (isSliding ? (enterActive ? "photo-slide-enter-active" : "photo-slide-enter-right") : "photo-slide-current"),
          }),

        !currentSrc &&
          h("div", { className: "absolute inset-0 w-full h-full flex items-center justify-center text-stone-400 text-sm" }, "Loading photo..."),

        h(
          "button",
          {
            onClick: (e) => {
              e.stopPropagation();
              setIdx((prev) => (prev + 1) % sourcePhotos.length);
            },
            className: "absolute right-4 top-1/2 -translate-y-1/2 z-20 w-11 h-11 rounded-full bg-black/25 backdrop-blur-md border border-white/10 text-white flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all active:scale-90",
            "aria-label": "Next photo",
            title: "Next photo",
          },
          h(
            "svg",
            { width: 18, height: 18, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: 2.5, strokeLinecap: "round", strokeLinejoin: "round" },
            h("path", { d: "M9 18l6-6-6-6" })
          )
        ),

        h(
          "button",
          {
            onClick: (e) => {
              e.stopPropagation();
              onOpenSettings();
            },
            className: "absolute bottom-4 right-4 z-20 px-4 py-2 bg-black/30 text-white rounded-2xl text-[10px] font-bold tracking-widest",
          },
          "SETTINGS"
        )
      );
    }

    function App() {
      const settingsSeed = loadLocalSettings();

      const [user, setUser] = useState(null);
      const [googleAuth, setGoogleAuth] = useState(loadGoogleAuth());

      const [isDarkMode, setIsDarkMode] = useState(settingsSeed.theme === "light" ? false : true);
      const [isIdle, setIsIdle] = useState(false);
      const [activeTab, setActiveTab] = useState("home");
      const [isFullscreenMode, setIsFullscreenMode] = useState(settingsSeed.fullscreen === true);

      const [habits, setHabits] = useState(loadLocalHabits());
      const [events, setEvents] = useState([]);
      const [tasks, setTasks] = useState([]);
      const [calendars, setCalendars] = useState([]);

      const [selectedCalIds, setSelectedCalIds] = useState(
        Array.isArray(settingsSeed.selectedCalIds) ? settingsSeed.selectedCalIds : []
      );

      const [viewDate, setViewDate] = useState(new Date());
      const [weatherData, setWeatherData] = useState(null);
      const [locationLabel, setLocationLabel] = useState("Santa Clara");
      const [coords, setCoords] = useState({ lat: 37.3541, lon: -121.9552 });

      const [isCalFilterOpen, setIsCalFilterOpen] = useState(false);
      const [showHabitForm, setShowHabitForm] = useState(false);
      const [newHabitName, setNewHabitName] = useState("");
      const [newHabitGoal, setNewHabitGoal] = useState(4);

      const [selectedDayEvents, setSelectedDayEvents] = useState(null);
      const [selectedDayDate, setSelectedDayDate] = useState(null);
      const [calendarSelectedDate, setCalendarSelectedDate] = useState(null);

      const [newTaskTitle, setNewTaskTitle] = useState("");
      const [isCreatingTask, setIsCreatingTask] = useState(false);
      const [googleErrorLabel, setGoogleErrorLabel] = useState("");
      const googleTokenClientRef = useRef(null);

      const [googlePhotosItems, setGooglePhotosItems] = useState(loadLocalPhotosSelection());
      const [photoTransitionInterval, setPhotoTransitionInterval] = useState(loadPhotoTransitionInterval());
      const [isPickingPhotos, setIsPickingPhotos] = useState(false);
      const [note, setNote] = useState(loadLocalNote());

      useEffect(() => {
        if (!("geolocation" in navigator)) return;
        navigator.geolocation.getCurrentPosition(
          async (position) => {
            const { latitude, longitude } = position.coords;
            setCoords({ lat: latitude, lon: longitude });

            try {
              const res = await fetch("https://nominatim.openstreetmap.org/reverse?lat=" + latitude + "&lon=" + longitude + "&format=json");
              const data = await res.json();
              const city = data?.address?.city || data?.address?.town || data?.address?.village || data?.address?.suburb || "Current Location";
              setLocationLabel(city);
            } catch {
              setLocationLabel("Current Location");
            }
          },
          () => {}
        );
      }, []);

      useEffect(() => {
        const unsubscribe = onAuthStateChanged(auth, (firebaseUser) => {
          setUser(firebaseUser);
        });

        (async () => {
          try {
            const customToken = typeof window.__initial_auth_token !== "undefined" ? window.__initial_auth_token : null;
            if (customToken) await signInWithCustomToken(auth, customToken);
          } catch (e) {
            console.warn("Auth initialization failed:", e);
          }
        })();

        return () => unsubscribe();
      }, []);

      useEffect(() => {
        const initGoogleClient = () => {
          if (window.google?.accounts?.oauth2) {
            googleTokenClientRef.current = window.google.accounts.oauth2.initTokenClient({
              client_id: GOOGLE_CLIENT_ID,
              scope: GOOGLE_SCOPES,
              callback: (resp) => {
                if (resp?.access_token) {
                  const next = {
                    access_token: resp.access_token,
                    expires_at: nowMs() + ((resp.expires_in || 3600) * 1000) - 60000,
                    scope: resp.scope || GOOGLE_SCOPES,
                    token_type: resp.token_type || "Bearer",
                  };
                  setGoogleAuth(next);
                  saveGoogleAuth(next);
                  setGoogleErrorLabel("");
                }
              },
            });
            return true;
          }
          return false;
        };

        if (initGoogleClient()) return;
        const interval = setInterval(() => {
          if (initGoogleClient()) clearInterval(interval);
        }, 300);

        setTimeout(() => clearInterval(interval), 10000);
        return () => clearInterval(interval);
      }, []);

      const requestGoogleAccessToken = useCallback((interactive = true) => {
        if (!window.google?.accounts?.oauth2 || !googleTokenClientRef.current) {
          alert("Google Identity Services has not loaded yet. Please try again.");
          return;
        }

        try {
          googleTokenClientRef.current.requestAccessToken({ prompt: interactive ? "consent" : "" });
        } catch (e) {
          console.warn("Google token request failed:", e);
          if (!interactive) setGoogleErrorLabel("Reconnect Google");
        }
      }, []);

      const googleApiFetch = useCallback(
        async (url, options = {}, retry = true) => {
          if (!googleAuth?.access_token) throw new Error("Google is not connected");

          const response = await fetch(url, {
            ...options,
            headers: {
              ...(options.headers || {}),
              Authorization: "Bearer " + googleAuth.access_token,
            },
          });

          if (response.status === 401) {
            clearGoogleAuth();
            setGoogleAuth(null);
            setGoogleErrorLabel("Reconnect Google");
            if (retry) requestGoogleAccessToken(false);
            throw new Error("Google API 401");
          }

          if (!response.ok) {
            const text = await response.text().catch(() => "");
            throw new Error(`Google API ${response.status}: ${text || "request failed"}`);
          }

          return response;
        },
        [googleAuth, requestGoogleAccessToken]
      );

      const googlePhotosApiFetch = useCallback(async (url, options = {}) => {
        if (!googleAuth?.access_token) throw new Error("Google is not connected");

        const response = await fetch(url, {
          ...options,
          headers: {
            ...(options.headers || {}),
            Authorization: "Bearer " + googleAuth.access_token,
            "Content-Type": "application/json",
          },
        });

        if (response.status === 401) {
          clearGoogleAuth();
          setGoogleAuth(null);
          setGoogleErrorLabel("Reconnect Google");
          throw new Error("Google Photos API 401");
        }

        if (!response.ok) {
          const text = await response.text().catch(() => "");
          throw new Error(`Google Photos API ${response.status}: ${text || "request failed"}`);
        }

        return response;
      }, [googleAuth]);

      const settingsDocRef = useMemo(
        () => user ? doc(db, "artifacts", appId, "users", user.uid, "dashboard", "settings") : null,
        [user]
      );

      const habitsCollectionRef = useMemo(
        () => user ? collection(db, "artifacts", appId, "users", user.uid, "habits") : null,
        [user]
      );

      useEffect(() => {
        const loader = document.getElementById("loader");
        if (!loader) return;
        requestAnimationFrame(() => {
          loader.style.opacity = "0";
          setTimeout(() => { loader.style.display = "none"; }, 300);
        });
      }, []);

      useEffect(() => {
        document.documentElement.classList.toggle("dark", isDarkMode);
        document.body.className = isDarkMode ? "dark" : "light";
      }, [isDarkMode]);

      useEffect(() => {
        saveLocalNote(note);
      }, [note]);

      const currentSettingsObject = useMemo(() => ({
        theme: isDarkMode ? "dark" : "light",
        fullscreen: isFullscreenMode,
        selectedCalIds,
        photoTransitionInterval,
        note,
        googlePhotosItems,
      }), [isDarkMode, isFullscreenMode, selectedCalIds, photoTransitionInterval, note, googlePhotosItems]);

      useEffect(() => {
        saveLocalSettings(currentSettingsObject);
        savePhotoTransitionInterval(photoTransitionInterval);
        saveLocalPhotosSelection(googlePhotosItems);
      }, [currentSettingsObject, photoTransitionInterval, googlePhotosItems]);

      useEffect(() => {
        if (!settingsDocRef) return;
        updateDoc(settingsDocRef, currentSettingsObject).catch(async () => {
          try { await setDoc(settingsDocRef, currentSettingsObject); } catch {}
        });
      }, [settingsDocRef, currentSettingsObject]);

      useEffect(() => {
        if (!settingsDocRef) return;

        const unsub = onSnapshot(settingsDocRef, (snap) => {
          if (!snap.exists()) return;
          const data = snap.data() || {};

          if (typeof data.theme === "string") setIsDarkMode(data.theme === "dark");
          if (typeof data.fullscreen === "boolean") setIsFullscreenMode(data.fullscreen);
          if (Array.isArray(data.selectedCalIds)) setSelectedCalIds(data.selectedCalIds);
          if (typeof data.photoTransitionInterval === "string") setPhotoTransitionInterval(data.photoTransitionInterval);
          if (typeof data.note === "string") setNote(data.note);
          if (Array.isArray(data.googlePhotosItems)) setGooglePhotosItems(data.googlePhotosItems);
        });

        return () => unsub();
      }, [settingsDocRef]);

      useEffect(() => {
        if (!db || !user || !habitsCollectionRef) {
          setHabits(loadLocalHabits());
          return;
        }

        const migrate = async () => {
          try {
            const localHabits = loadLocalHabits();
            if (localHabits.length > 0) {
              const firstId = String(localHabits[0].id);
              const existingCheck = await getDoc(doc(habitsCollectionRef, firstId));
              if (!existingCheck.exists()) {
                for (const habit of localHabits) {
                  await setDoc(doc(habitsCollectionRef, String(habit.id)), habit);
                }
              }
            }
          } catch (e) {
            console.warn("Migration failed:", e);
          }
        };

        migrate();

        const unsubscribe = onSnapshot(
          habitsCollectionRef,
          (snapshot) => {
            const list = snapshot.docs.map((d) => ({ id: d.id, ...d.data() }));
            setHabits(list);
            saveLocalHabits(list);
          },
          (err) => {
            console.error(err);
            setHabits(loadLocalHabits());
          }
        );

        return () => unsubscribe();
      }, [user, habitsCollectionRef]);

      const persistSettingsPatch = async (patch) => {
        const next = { ...currentSettingsObject, ...patch };
        saveLocalSettings(next);
        if (patch.googlePhotosItems) saveLocalPhotosSelection(patch.googlePhotosItems);
        if (patch.note !== undefined) saveLocalNote(patch.note);
        if (patch.photoTransitionInterval) savePhotoTransitionInterval(patch.photoTransitionInterval);

        if (settingsDocRef) {
          try {
            await updateDoc(settingsDocRef, patch);
          } catch {
            try { await setDoc(settingsDocRef, next); } catch {}
          }
        }
      };

      const pollGooglePhotosSession = useCallback(async (sessionId) => {
        const maxAttempts = 60;

        for (let attempt = 0; attempt < maxAttempts; attempt += 1) {
          await new Promise((resolve) => setTimeout(resolve, 2000));

          const sessionRes = await googlePhotosApiFetch("https://photospicker.googleapis.com/v1/sessions/" + sessionId);
          const sessionData = await sessionRes.json();

          if (sessionData.mediaItemsSet) {
            let allItems = [];
            let pageToken = "";

            do {
              const url = "https://photospicker.googleapis.com/v1/mediaItems?sessionId=" + encodeURIComponent(sessionId) + (pageToken ? "&pageToken=" + encodeURIComponent(pageToken) : "");
              const itemsRes = await googlePhotosApiFetch(url);
              const itemsData = await itemsRes.json();

              const normalized = (itemsData.mediaItems || []).map((item) => ({
                id: item.id,
                baseUrl: item.mediaFile?.baseUrl || item.baseUrl || "",
                mimeType: item.mediaFile?.mimeType || item.mimeType || "",
                filename: item.mediaFile?.filename || item.filename || "",
              }));

              allItems = [...allItems, ...normalized];
              pageToken = itemsData.nextPageToken || "";
            } while (pageToken);

            setGooglePhotosItems(allItems);
            saveLocalPhotosSelection(allItems);
            persistSettingsPatch({ googlePhotosItems: allItems });

            try {
              await googlePhotosApiFetch("https://photospicker.googleapis.com/v1/sessions/" + sessionId, { method: "DELETE" });
            } catch {}

            return allItems;
          }
        }

        throw new Error("Timed out waiting for Google Photos selection");
      }, [googlePhotosApiFetch]);

      const chooseGooglePhotos = async () => {
        if (!googleAuth?.access_token) {
          loginGoogle();
          return;
        }

        try {
          setIsPickingPhotos(true);

          const createRes = await googlePhotosApiFetch("https://photospicker.googleapis.com/v1/sessions", {
            method: "POST",
            body: JSON.stringify({}),
          });

          const sessionData = await createRes.json();

          if (!sessionData.id || !sessionData.pickerUri) {
            throw new Error("Could not create Google Photos picker session");
          }

          window.open(sessionData.pickerUri, "_blank", "noopener,noreferrer");
          await pollGooglePhotosSession(sessionData.id);
        } catch (e) {
          console.error("Google Photos picker failed:", e);
          alert("Could not load Google Photos picker. Please try again.");
        } finally {
          setIsPickingPhotos(false);
        }
      };

      const updateHabitInCloud = async (id, updatedData) => {
        if (db && user) {
          const habitDoc = doc(db, "artifacts", appId, "users", user.uid, "habits", String(id));
          await updateDoc(habitDoc, updatedData);
          return;
        }
        const next = habits.map((h) => (String(h.id) === String(id) ? { ...h, ...updatedData } : h));
        setHabits(next);
        saveLocalHabits(next);
      };

      const addHabitToCloud = async (name, goal) => {
        const id = Date.now().toString();
        const newHabit = { id, name, goal, completions: [] };

        if (db && user) {
          const habitDoc = doc(db, "artifacts", appId, "users", user.uid, "habits", id);
          await setDoc(habitDoc, newHabit);
          return;
        }

        const next = [...habits, newHabit];
        setHabits(next);
        saveLocalHabits(next);
      };

      const deleteHabitFromCloud = async (id) => {
        if (db && user) {
          const habitDoc = doc(db, "artifacts", appId, "users", user.uid, "habits", String(id));
          await deleteDoc(habitDoc);
          return;
        }
        const next = habits.filter((h) => String(h.id) !== String(id));
        setHabits(next);
        saveLocalHabits(next);
      };

      useEffect(() => {
        const fetchWeather = async () => {
          try {
            const res = await fetch(
              "https://api.open-meteo.com/v1/forecast?latitude=" +
                coords.lat +
                "&longitude=" +
                coords.lon +
                "&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m&daily=weather_code,temperature_2m_max,temperature_2m_min,uv_index_max,sunrise,sunset,precipitation_probability_max&temperature_unit=fahrenheit&wind_speed_unit=mph&precipitation_unit=inch&timezone=auto"
            );
            if (!res.ok) return;
            setWeatherData(await res.json());
          } catch {}
        };

        fetchWeather();
        const intervalId = setInterval(fetchWeather, 1800000);
        return () => clearInterval(intervalId);
      }, [coords]);

      const fetchGoogleData = useCallback(async () => {
        if (!googleAuth?.access_token) return;

        try {
          const start = new Date(viewDate.getFullYear(), viewDate.getMonth(), 1).toISOString();

          let calendarItems = calendars;
          if (calendarItems.length === 0) {
            const listRes = await googleApiFetch("https://www.googleapis.com/calendar/v3/users/me/calendarList");
            const listData = await listRes.json();
            if (listData.items) {
              calendarItems = listData.items;
              setCalendars(listData.items);
            }
          }

          const ids = selectedCalIds.length > 0 ? selectedCalIds : calendarItems.map((c) => c.id);

          if (ids.length > 0) {
            const results = await Promise.all(
              ids.map((id) =>
                googleApiFetch(
                  "https://www.googleapis.com/calendar/v3/calendars/" +
                    encodeURIComponent(id) +
                    "/events?timeMin=" +
                    start +
                    "&singleEvents=true&orderBy=startTime"
                )
                  .then((r) => r.json())
                  .catch(() => ({ items: [] }))
              )
            );

            const merged = results
              .flatMap((r) => r.items || [])
              .map((ev) => ({
                title: ev.summary || "Untitled",
                rawDate: ev.start?.dateTime || ev.start?.date,
                time: ev.start?.dateTime
                  ? new Date(ev.start.dateTime).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })
                  : "All Day",
                location: ev.location || "",
                notes: ev.description || "",
              }))
              .filter((e) => e.rawDate)
              .sort((a, b) => new Date(a.rawDate) - new Date(b.rawDate));

            setEvents(merged);
          }

          const resT = await googleApiFetch("https://www.googleapis.com/tasks/v1/lists/@default/tasks?showCompleted=true&maxResults=20");
          const dT = await resT.json();
          setTasks((dT.items || []).map((tk) => ({ id: tk.id, title: tk.title, status: tk.status || "needsAction" })));
          setGoogleErrorLabel("");
        } catch (e) {
          console.warn("Google data fetch failed:", e);
        }
      }, [googleAuth, googleApiFetch, viewDate, calendars, selectedCalIds]);

      useEffect(() => {
        if (googleAuth?.access_token) fetchGoogleData();
      }, [googleAuth, fetchGoogleData]);

      const createGoogleTask = async () => {
        if (!googleAuth?.access_token || !newTaskTitle.trim() || isCreatingTask) return;

        try {
          setIsCreatingTask(true);
          await googleApiFetch("https://www.googleapis.com/tasks/v1/lists/@default/tasks", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ title: newTaskTitle.trim() }),
          });
          setNewTaskTitle("");
          await fetchGoogleData();
        } catch (err) {
          console.error("Task creation failed:", err);
          alert("Could not create task. Please reconnect Google and try again.");
        } finally {
          setIsCreatingTask(false);
        }
      };

      const loginFirebase = async () => {
        try {
          await signInWithPopup(auth, googleProvider);
        } catch (e) {
          console.error("Firebase Google sign-in failed:", e);
          alert("Could not sign in for sync. Please try again.");
        }
      };

      const logoutFirebase = async () => {
        try {
          await signOut(auth);
          setHabits(loadLocalHabits());
        } catch (e) {
          console.error("Firebase sign-out failed:", e);
        }
      };

      const loginGoogle = () => requestGoogleAccessToken(true);

      const disconnectGoogle = () => {
        clearGoogleAuth();
        setGoogleAuth(null);
        setEvents([]);
        setTasks([]);
        setCalendars([]);
        setGoogleErrorLabel("");
      };

      const toggleFullscreen = () => {
        const next = !isFullscreenMode;
        setIsFullscreenMode(next);
        persistSettingsPatch({ fullscreen: next });
        if (next) setActiveTab("home");
      };

      const sharedProps = {
        googleAuth,
        weatherData,
        viewDate,
        habits,
        events,
        tasks,
        locationLabel,
        newTaskTitle,
        setNewTaskTitle,
        isCreatingTask,
        onCreateTask: createGoogleTask,
        onNavigate: setActiveTab,
        onMonthChange: setViewDate,
        onOpenFilter: () => setIsCalFilterOpen(true),
        onToggleHabitCompletion: (id, dateStr) => {
          const habit = habits.find((h) => String(h.id) === String(id));
          if (!habit) return;
          const completions = habit.completions || [];
          const nextCompletions = completions.includes(dateStr)
            ? completions.filter((c) => c !== dateStr)
            : [...completions, dateStr];
          updateHabitInCloud(id, { completions: nextCompletions });
        },
        onDateClick: (dayEvents, date) => {
          setSelectedDayEvents(dayEvents);
          setSelectedDayDate(date);
        },
        onToggleTask: async (id, currentStatus) => {
          if (!googleAuth?.access_token) return;
          try {
            await googleApiFetch("https://www.googleapis.com/tasks/v1/lists/@default/tasks/" + id, {
              method: "PATCH",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ status: currentStatus === "completed" ? "needsAction" : "completed" }),
            });
            fetchGoogleData();
          } catch (e) {
            console.warn("Task toggle failed:", e);
          }
        },
      };

      const renderHome = () => {
        const layoutItems = [
          { id: "clock", component: ClockWidget },
          { id: "weather", component: WeatherWidget },
          { id: "cal", component: CalendarGrid },
          { id: "stream", component: EventStreamWidget },
          { id: "tasks", component: TasksWidget },
          { id: "notes", component: () => h(NotesWidget, { note, setNote: (value) => { setNote(value); persistSettingsPatch({ note: value }); } }) },
          { id: "habits", component: HabitWidget },
          {
            id: "photo",
            component: (props) =>
              h(PhotoWidget, {
                ...props,
                googlePhotosItems,
                googleAuth,
                photoTransitionInterval,
                onOpenSettings: () => setActiveTab("settings"),
              }),
          },
        ];

        const gridClass = isFullscreenMode
          ? "grid grid-cols-3 grid-rows-3 gap-4 flex-1 min-h-0 h-full overflow-hidden"
          : "grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 flex-1";

        const getCardClass = (itemId) => {
          if (!isFullscreenMode) {
            return "glass-card min-h-[220px]" + (itemId === "photo" ? " photo-card" : "");
          }
          if (itemId === "cal") return "glass-card h-full min-h-0 overflow-hidden";
          if (itemId === "stream" || itemId === "tasks" || itemId === "notes" || itemId === "habits") return "glass-card h-full min-h-0 overflow-hidden";
          return "glass-card h-full min-h-0";
        };

        return h(
          "div",
          { className: gridClass },
          layoutItems.map((item) =>
            h(
              "div",
              { key: item.id, className: getCardClass(item.id) },
              h(item.component, sharedProps)
            )
          )
        );
      };

      const renderWeather = () =>
        h(
          "div",
          { className: "glass-card p-10 min-h-[500px]" },
          h(
            "div",
            { className: "mb-12" },
            h("h2", { className: "serif text-4xl mb-2 text-stone-100" }, "Weather"),
            h("p", { className: "text-[12px] text-stone-500 uppercase tracking-[0.4em] font-bold" }, locationLabel + ", California")
          ),
          weatherData &&
            h(
              "div",
              { className: "grid grid-cols-1 lg:grid-cols-2 gap-8" },
              h(
                "div",
                { className: "p-8 bg-stone-900/40 rounded-[32px] border border-white/5" },
                h(
                  "div",
                  { className: "flex items-center gap-6 mb-8" },
                  h(WeatherIcon, { code: weatherData.current.weather_code, className: "w-20 h-20" }),
                  h(
                    "div",
                    null,
                    h("div", { className: "text-6xl font-light serif text-stone-100" }, Math.round(weatherData.current.temperature_2m) + "°"),
                    h("p", { className: "text-lg text-stone-400 serif italic" }, WEATHER_CODES[weatherData.current.weather_code])
                  )
                ),
                h(
                  "div",
                  { className: "grid grid-cols-2 gap-6 pt-6 border-t border-stone-800" },
                  h("div", null, h("p", { className: "text-[10px] text-stone-600 uppercase font-black mb-1" }, "Feels Like"), h("p", { className: "text-base font-medium text-stone-300" }, Math.round(weatherData.current.apparent_temperature || weatherData.current.temperature_2m) + "°")),
                  h("div", null, h("p", { className: "text-[10px] text-stone-600 uppercase font-black mb-1" }, "Wind Speed"), h("p", { className: "text-base font-medium text-stone-300" }, Math.round(weatherData.current.wind_speed_10m || 0) + " mph")),
                  h("div", null, h("p", { className: "text-[10px] text-stone-600 uppercase font-black mb-1" }, "Humidity"), h("p", { className: "text-base font-medium text-stone-300" }, (weatherData.current.relative_humidity_2m || 0) + "%")),
                  h("div", null, h("p", { className: "text-[10px] text-stone-600 uppercase font-black mb-1" }, "UV Index"), h("p", { className: "text-base font-medium text-stone-300" }, weatherData.daily.uv_index_max[0] || 0))
                )
              ),
              h(
                "div",
                { className: "space-y-3" },
                (weatherData.daily.time || []).map((date, idx) =>
                  h(
                    "div",
                    {
                      key: date,
                      className: "flex items-center justify-between p-5 bg-stone-900/20 rounded-2xl border border-white/5",
                    },
                    h("span", { className: "w-24 text-sm font-semibold text-stone-300" }, new Date(date + "T00:00:00").toLocaleDateString("en-US", { weekday: "long" })),
                    h(
                      "div",
                      { className: "flex items-center gap-4 flex-1" },
                      h(WeatherIcon, { code: weatherData.daily.weather_code[idx], className: "w-5 h-5" }),
                      h("span", { className: "text-xs text-stone-500 italic" }, WEATHER_CODES[weatherData.daily.weather_code[idx]] || "Cloudy")
                    ),
                    h("span", { className: "font-bold text-stone-300 tabular-nums text-sm" }, Math.round(weatherData.daily.temperature_2m_max[idx]) + "° / " + Math.round(weatherData.daily.temperature_2m_min[idx]) + "°")
                  )
                )
              )
            )
        );

      const renderHabits = () =>
        h(
          "div",
          { className: "glass-card p-10 min-h-[500px]" },
          h(
            "div",
            { className: "flex justify-between items-end mb-12" },
            h(
              "div",
              null,
              h("h2", { className: "serif text-4xl mb-2 text-stone-100" }, "Daily Rhythms"),
              h("p", { className: "text-[12px] text-stone-500 font-bold uppercase tracking-widest" }, "Focus on the week")
            ),
            !showHabitForm &&
              h(
                "button",
                {
                  onClick: () => setShowHabitForm(true),
                  className: "px-5 py-2.5 bg-stone-800 text-white rounded-2xl text-[10px] font-bold tracking-widest",
                },
                "+ NEW HABIT"
              )
          ),
          showHabitForm &&
            h(
              "div",
              {
                className: "mb-10 p-8 bg-stone-900/40 rounded-[32px] border border-white/5",
              },
              h("h3", { className: "text-[10px] font-bold text-stone-400 uppercase tracking-widest mb-6" }, "Create New Habit"),
              h(
                "div",
                { className: "flex flex-col md:flex-row gap-4" },
                h("input", {
                  type: "text",
                  placeholder: "Habit name",
                  value: newHabitName,
                  onChange: (e) => setNewHabitName(e.target.value),
                  className: "flex-1 bg-black border border-stone-800 rounded-2xl px-4 py-3 text-sm focus:outline-none text-white font-medium",
                }),
                h(
                  "div",
                  { className: "flex items-center gap-3" },
                  h("span", { className: "text-[10px] font-bold text-stone-400 uppercase" }, "Goal:"),
                  h(
                    "select",
                    {
                      value: newHabitGoal,
                      onChange: (e) => setNewHabitGoal(parseInt(e.target.value, 10)),
                      className: "bg-black border border-stone-800 rounded-2xl px-4 py-3 text-sm focus:outline-none text-white font-medium",
                    },
                    [1, 2, 3, 4, 5, 6, 7].map((n) => h("option", { key: n, value: n }, n + " days/week"))
                  )
                ),
                h(
                  "div",
                  { className: "flex gap-2" },
                  h(
                    "button",
                    {
                      onClick: () => {
                        if (newHabitName.trim()) {
                          addHabitToCloud(newHabitName.trim(), newHabitGoal);
                          setNewHabitName("");
                          setShowHabitForm(false);
                        }
                      },
                      className: "px-6 py-3 bg-emerald-500 text-white rounded-2xl text-xs font-bold",
                    },
                    "Create"
                  ),
                  h(
                    "button",
                    {
                      onClick: () => setShowHabitForm(false),
                      className: "px-6 py-3 bg-stone-900 text-stone-300 rounded-2xl text-xs font-bold border border-white/5",
                    },
                    "Cancel"
                  )
                )
              )
            ),
          h(
            "div",
            { className: "grid grid-cols-1 md:grid-cols-2 gap-6" },
            habits.map((habit) =>
              h(
                "div",
                {
                  key: habit.id,
                  className: "p-8 bg-stone-900/30 rounded-[32px] border border-white/5 group transition-all hover:shadow-lg text-stone-200",
                },
                h(
                  "div",
                  { className: "flex justify-between items-start mb-8" },
                  h(
                    "div",
                    null,
                    h("h3", { className: "text-xl font-semibold" }, habit.name),
                    h("p", { className: "text-[11px] font-bold text-stone-500 uppercase mt-1" }, (habit.completions || []).filter((c) => parseLocalDate(c) >= getStartOfWeek()).length + " / " + habit.goal + " target days")
                  ),
                  h(
                    "button",
                    {
                      onClick: () => deleteHabitFromCloud(habit.id),
                      className: "text-red-300 opacity-0 group-hover:opacity-100 transition-all text-[10px] font-bold uppercase",
                    },
                    "Delete"
                  )
                ),
                h(
                  "div",
                  { className: "flex justify-between items-center gap-1" },
                  Array.from({ length: 7 }, (_, i) => {
                    const d = new Date(getStartOfWeek());
                    d.setDate(d.getDate() + i);
                    const dateStr = d.toISOString().split("T")[0];
                    return h(
                      "div",
                      {
                        key: dateStr,
                        onClick: () => sharedProps.onToggleHabitCompletion(habit.id, dateStr),
                        className: "flex flex-col items-center gap-2 cursor-pointer",
                      },
                      h("span", { className: "text-[9px] font-bold text-stone-500 uppercase" }, ["M", "T", "W", "T", "F", "S", "S"][i]),
                      h("div", {
                        className: "habit-dot " + ((habit.completions || []).includes(dateStr) ? "active" : "") + (dateStr === getTodayStr() ? " today" : ""),
                      })
                    );
                  })
                )
              )
            )
          )
        );

      const filteredCalendarEvents = calendarSelectedDate
        ? events.filter((e) => {
            const a = new Date(e.rawDate);
            return a.getFullYear() === calendarSelectedDate.getFullYear() &&
              a.getMonth() === calendarSelectedDate.getMonth() &&
              a.getDate() === calendarSelectedDate.getDate();
          })
        : events.filter((e) => new Date(e.rawDate) >= new Date(new Date().setHours(0, 0, 0, 0)));

      const renderCalendar = () =>
        h(CalendarPage, {
          viewDate,
          onMonthChange: setViewDate,
          onOpenFilter: () => setIsCalFilterOpen(true),
          events,
          filteredEvents: filteredCalendarEvents,
          selectedDayDate: calendarSelectedDate,
          onDateClick: (_dayEvents, date) => {
            setCalendarSelectedDate(date);
          },
          onShowAllEvents: () => setCalendarSelectedDate(null),
        });

      const renderSettings = () =>
        h(SettingsPage, {
          user,
          googleAuth,
          googleErrorLabel,
          googlePhotosItems,
          isPickingPhotos,
          photoTransitionInterval,
          onChangePhotoTransitionInterval: (value) => {
            setPhotoTransitionInterval(value);
            persistSettingsPatch({ photoTransitionInterval: value });
          },
          onReconnectGoogle: loginGoogle,
          onDisconnectGoogle: disconnectGoogle,
          onLoginFirebase: loginFirebase,
          onLogoutFirebase: logoutFirebase,
          onChooseGooglePhotos: chooseGooglePhotos,
          onClearGooglePhotos: () => {
            clearLocalPhotosSelection();
            setGooglePhotosItems([]);
            persistSettingsPatch({ googlePhotosItems: [] });
          },
          onNavigate: setActiveTab,
        });

      const getPageContent = () => {
        if (activeTab === "home") return renderHome();
        if (activeTab === "weather") return renderWeather();
        if (activeTab === "habits") return renderHabits();
        if (activeTab === "calendar") return renderCalendar();
        return renderSettings();
      };

      return h(
        "div",
        {
          className: "p-4 md:p-6 xl:p-8 max-w-[1600px] mx-auto flex flex-col transition-all " + (isFullscreenMode ? "h-screen overflow-hidden" : "min-h-screen"),
        },
        h(SleepModeOverlay, { isActive: isIdle, onExit: () => setIsIdle(false) }),
        h(DayDetailModal, {
          events: selectedDayEvents || [],
          date: selectedDayDate,
          onClose: () => {
            setSelectedDayEvents(null);
            setSelectedDayDate(null);
          },
        }),
        isCalFilterOpen &&
          h(CalendarFilterModal, {
            calendars,
            selectedIds: selectedCalIds,
            onToggle: (id) => {
              const next = selectedCalIds.includes(id)
                ? selectedCalIds.filter((x) => x !== id)
                : [...selectedCalIds, id];
              setSelectedCalIds(next);
              persistSettingsPatch({ selectedCalIds: next });
            },
            onClose: () => setIsCalFilterOpen(false),
          }),

        h(
          "header",
          {
            className: "flex justify-between items-center mb-4 bg-stone-950/70 border border-stone-600/50 p-3 px-4 md:px-5 rounded-[32px] shadow-sm flex-shrink-0",
          },
          h(
            "div",
            { className: "flex gap-2" },
            ["home", "weather", "habits", "calendar"].map((tab) =>
              h(
                "button",
                {
                  key: tab,
                  onClick: () => setActiveTab(tab),
                  className:
                    "text-[10px] font-bold px-5 py-2.5 rounded-2xl transition-all uppercase " +
                    (activeTab === tab ? "bg-stone-800 text-white shadow-md" : "text-stone-400 hover:text-stone-100"),
                },
                tab
              )
            )
          ),

          h(
            "div",
            { className: "flex items-center gap-6" },
            h(
              "div",
              { className: "flex items-center gap-3 border-r border-stone-800 pr-6" },
              h(
                "button",
                {
                  onClick: toggleFullscreen,
                  className: "p-2 rounded-xl transition-all " + (isFullscreenMode ? "bg-stone-800 text-white shadow-lg" : "text-stone-300 hover:text-stone-100"),
                },
                h(
                  "svg",
                  { width: 18, height: 18, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: 2.5 },
                  h("path", {
                    d: isFullscreenMode
                      ? "M4 14h6v6m10-6h-6v6M4 10h6V4m10 6h-6V4"
                      : "M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3",
                  })
                )
              ),
              h(
                "button",
                {
                  onClick: () => setIsIdle(true),
                  className: "p-2 text-stone-300 hover:text-stone-100",
                },
                h(
                  "svg",
                  { width: 18, height: 18, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: 2.5 },
                  h("path", {
                    d: "m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z",
                  })
                )
              ),
              h(
                "button",
                {
                  onClick: () => setActiveTab("settings"),
                  className: "p-2 rounded-xl transition-all " + (activeTab === "settings" ? "bg-stone-800 text-white shadow-lg" : "text-stone-300 hover:text-stone-100"),
                },
                h(
                  "svg",
                  { width: 18, height: 18, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: 2.2 },
                  h("circle", { cx: 12, cy: 12, r: 3 }),
                  h("path", {
                    d: "M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h.01a1.65 1.65 0 0 0 .99-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 .99 1.51h.01a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v.01a1.65 1.65 0 0 0 1.51.99H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51.99Z",
                  })
                )
              )
            ),

            !googleAuth?.access_token &&
              h(
                "button",
                {
                  onClick: loginGoogle,
                  className: "text-[10px] font-bold bg-white text-stone-900 border border-stone-200 px-5 py-2.5 rounded-2xl shadow-sm hover:bg-stone-50 transition-all",
                },
                "GOOGLE"
              ),

            googleErrorLabel && h("span", { className: "text-[10px] font-bold text-amber-500 uppercase" }, googleErrorLabel),

            h(ThemeToggle, {
              isDarkMode,
              onToggle: () => {
                const next = !isDarkMode;
                setIsDarkMode(next);
                persistSettingsPatch({ theme: next ? "dark" : "light" });
              },
            })
          )
        ),

        getPageContent(),

        h(
          "footer",
          {
            className: "py-6 mt-auto text-center text-[10px] text-stone-900 uppercase font-black tracking-[0.7em] flex-shrink-0 " + (isFullscreenMode ? "hidden" : ""),
          },
          "Dayboard • Balance"
        )
      );
    }

    try {
      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(h(App));
    } catch (err) {
      console.error("App failed to render:", err);
      const loader = document.getElementById("loader");
      if (loader) loader.style.display = "none";
      const root = document.getElementById("root");
      root.innerHTML =
        '<div style="padding:32px;font-family:Inter,sans-serif;color:#fca5a5;">' +
        "<h1>App failed to load</h1>" +
        "<p>Open DevTools console to see the error.</p>" +
        "</div>";
    }
  </script>
</body>
</html>
