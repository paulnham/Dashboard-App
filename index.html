        async function extractAlbumPalette(imageUrl) {
      return new Promise((resolve) => {
        const img = new Image();
        img.crossOrigin = "anonymous";
        img.onload = () => {
          try {
            const canvas = document.createElement("canvas");
            const ctx = canvas.getContext("2d", { willReadFrequently: true });
            const size = 48;
            canvas.width = size;
            canvas.height = size;
            ctx.drawImage(img, 0, 0, size, size);
            const data = ctx.getImageData(0, 0, size, size).data;
            const buckets = [];
            for (let i = 0; i < data.length; i += 16) {
              const r = data[i], g = data[i + 1], b = data[i + 2], a = data[i + 3];
              if (a < 200) continue;
              const brightness = (r + g + b) / 3;
              if (brightness < 18 || brightness > 242) continue;
              buckets.push([r, g, b]);
            }
            if (!buckets.length) return resolve(DEFAULT_PALETTE);
            const sample = buckets.filter((_, i) => i % 3 === 0);
            const sorted = sample.sort((a, b) => (b[0] + b[1] + b[2]) - (a[0] + a[1] + a[2]));
            const picks = [
              sorted[0],
              sorted[Math.floor(sorted.length * 0.25)] || sorted[0],
              sorted[Math.floor(sorted.length * 0.55)] || sorted[0],
              sorted[Math.floor(sorted.length * 0.8)] || sorted[0],
            ];
            resolve(picks.map(([r, g, b]) => `rgb(${r}, ${g}, ${b})`));
          } catch {
            resolve(DEFAULT_PALETTE);
          }
        };
        img.onerror = () => resolve(DEFAULT_PALETTE);
        img.src = imageUrl;
      });
    }

    async function spotifyTokenRequest(params) {
      const response = await fetch("https://accounts.spotify.com/api/token", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: new URLSearchParams(params),
      });
      const data = await response.json();
      if (!response.ok) throw new Error(data?.error_description || data?.error || "Spotify token request failed");
      return data;
    }

    async function refreshSpotifyAccessToken(currentAuth) {
      if (!currentAuth?.refresh_token) throw new Error("No Spotify refresh token available");
      const data = await spotifyTokenRequest({
        client_id: SPOTIFY_CLIENT_ID,
        grant_type: "refresh_token",
        refresh_token: currentAuth.refresh_token,
      });
      return {
        access_token: data.access_token,
        refresh_token: data.refresh_token || currentAuth.refresh_token,
        token_type: data.token_type || "Bearer",
        scope: data.scope || currentAuth.scope || "",
        expires_at: nowMs() + ((data.expires_in || 3600) * 1000) - 60000,
      };
    }

    async function spotifyApiFetch(path, spotifyAuth, setSpotifyAuth, options = {}) {
      let authObj = spotifyAuth;
      if (!authObj?.access_token) throw new Error("Spotify is not connected");

      if (!authObj.expires_at || authObj.expires_at <= nowMs()) {
        authObj = await refreshSpotifyAccessToken(authObj);
        saveSpotifyAuth(authObj);
        setSpotifyAuth(authObj);
      }

      let response = await fetch("https://api.spotify.com/v1" + path, {
        ...options,
        headers: {
          ...(options.headers || {}),
          Authorization: "Bearer " + authObj.access_token,
        },
      });

      if (response.status === 401 && authObj.refresh_token) {
        authObj = await refreshSpotifyAccessToken(authObj);
        saveSpotifyAuth(authObj);
        setSpotifyAuth(authObj);

        response = await fetch("https://api.spotify.com/v1" + path, {
          ...options,
          headers: {
            ...(options.headers || {}),
            Authorization: "Bearer " + authObj.access_token,
          },
        });
      }

      if (!response.ok && response.status !== 204) {
        const text = await response.text().catch(() => "");
        throw new Error(`Spotify API ${response.status}: ${text || "request failed"}`);
      }

      return response;
    }

  const fallbackPhotos = PHOTOS;
  const usingGooglePhotos = googlePhotoUrls.length > 0;
  const sourcePhotos = usingGooglePhotos ? googlePhotoUrls : fallbackPhotos;

  const intervalMsMap = {
    "10s": 10000,
    "30s": 30000,
    "1m": 60000,
    "5m": 300000,
  };

  const objectUrlRef = useRef(null);
  const objectUrlPrevRef = useRef(null);
  const transitionTimeoutRef = useRef(null);

  const [idx, setIdx] = useState(0);
  const [currentSrc, setCurrentSrc] = useState(sourcePhotos[0] || "");
  const [prevSrc, setPrevSrc] = useState("");
  const [isSliding, setIsSliding] = useState(false);

  useEffect(() => {
    setIdx(0);
  }, [sourcePhotos.length]);

  useEffect(() => {
    const ms = intervalMsMap[photoTransitionInterval];
    if (!ms || sourcePhotos.length <= 1) return;

    const timer = setInterval(() => {
      setIdx((prev) => (prev + 1) % sourcePhotos.length);
    }, ms);

    return () => clearInterval(timer);
  }, [photoTransitionInterval, sourcePhotos.length]);

  useEffect(() => {
    const revokeUrl = (ref) => {
      if (ref.current) {
        URL.revokeObjectURL(ref.current);
        ref.current = null;
      }
    };

    let cancelled = false;

    const resolveDisplaySrc = async (src) => {
      if (!src) return "";

      if (!usingGooglePhotos) return src;
      if (!googleAuth?.access_token) return "";

      const response = await fetch(src, {
        headers: {
          Authorization: "Bearer " + googleAuth.access_token,
        },
      });

      if (!response.ok) {
        throw new Error("Google Photos image fetch failed: " + response.status);
      }

      const blob = await response.blob();
      const objectUrl = URL.createObjectURL(blob);
      return objectUrl;
    };

    const loadNextImage = async () => {
      const nextSource = sourcePhotos[idx];
      if (!nextSource) {
        setPrevSrc("");
        setCurrentSrc("");
        return;
      }

      try {
        const nextDisplaySrc = await resolveDisplaySrc(nextSource);
        if (cancelled) {
          if (nextDisplaySrc.startsWith("blob:")) URL.revokeObjectURL(nextDisplaySrc);
          return;
        }

        if (!currentSrc) {
          if (nextDisplaySrc.startsWith("blob:")) {
            revokeUrl(objectUrlRef);
            objectUrlRef.current = nextDisplaySrc;
          }
          setCurrentSrc(nextDisplaySrc);
          return;
        }

        setPrevSrc(currentSrc);

        if (currentSrc.startsWith("blob:")) {
          objectUrlPrevRef.current = currentSrc;
        }

        if (nextDisplaySrc.startsWith("blob:")) {
          revokeUrl(objectUrlRef);
          objectUrlRef.current = nextDisplaySrc;
        }

        setCurrentSrc(nextDisplaySrc);
        setIsSliding(true);

        if (transitionTimeoutRef.current) {
          clearTimeout(transitionTimeoutRef.current);
        }

        transitionTimeoutRef.current = setTimeout(() => {
          setPrevSrc("");
          setIsSliding(false);

          if (objectUrlPrevRef.current) {
            URL.revokeObjectURL(objectUrlPrevRef.current);
            objectUrlPrevRef.current = null;
          }
        }, 720);
      } catch (err) {
        console.error("Google Photos widget image failed:", err);
      }
    };

    return () => {
      cancelled = true;
    };
  }, [idx, sourcePhotos, usingGooglePhotos, googleAuth]);

    return () => {
      if (transitionTimeoutRef.current) clearTimeout(transitionTimeoutRef.current);
      if (objectUrlRef.current) URL.revokeObjectURL(objectUrlRef.current);
      if (objectUrlPrevRef.current) URL.revokeObjectURL(objectUrlPrevRef.current);
    };
  }, []);

    return h(

      { className: "p-7 flex flex-col items-center justify-center h-full gap-3 text-center" },
      h(
        "div",
        {

        },
        "🖼"
      ),
      h("p", { className: "text-xs font-bold text-stone-400 uppercase tracking-widest" }, "Photos"),
      h("p", { className: "text-[11px] text-stone-400 dark:text-stone-500 italic" }, "Choose photos in Settings"),
      onOpenSettings &&
        h(
          "button",
          {
            onClick: onOpenSettings,
            className:
              "mt-2 px-4 py-2 bg-stone-800 text-white rounded-2xl text-[10px] font-bold tracking-widest",
          },
          "OPEN SETTINGS"
        )
    );
  }

  return h(
    "div",
    { className: "relative h-full w-full group photo-card overflow-hidden" },

    prevSrc &&
      h("img", {
        src: prevSrc,
        className: "photo-slide-layer " + (isSliding ? "photo-slide-exit-left" : "photo-slide-current"),
      }),

    currentSrc &&
      h("img", {
        src: currentSrc,
        className:
          "photo-slide-layer " +
          (isSliding ? "photo-slide-enter-right photo-slide-enter-active" : "photo-slide-current"),
      }),

    !currentSrc &&
      h(
        "div",
        { className: "absolute inset-0 w-full h-full flex items-center justify-center text-stone-400 text-sm" },
        "Loading photo..."
      ),

    usingGooglePhotos &&
      h(
        "div",
        {
          className:
            "absolute top-3 left-3 z-20 w-9 h-9 rounded-xl bg-black/25 backdrop-blur-md border border-white/10 flex items-center justify-center text-white/90",
          title: "Google Photos",
        },
        h(
          "svg",
          {
            width: 16,
            height: 16,
            viewBox: "0 0 24 24",
            fill: "none",
            stroke: "currentColor",
            strokeWidth: 2,
            strokeLinecap: "round",
            strokeLinejoin: "round",
          },
          h("path", { d: "M4 7h3l2-2h6l2 2h3v10a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2z" }),
          h("circle", { cx: 12, cy: 13, r: 3 })

          setIdx((prev) => (prev + 1) % sourcePhotos.length);
        },
        className:

      if (code && codeVerifier) {
        try {
          const data = await spotifyTokenRequest({
            client_id: SPOTIFY_CLIENT_ID,
            grant_type: "authorization_code",
            code,
            redirect_uri: window.location.origin + window.location.pathname,
            code_verifier: codeVerifier,
          });

          if (data.access_token) {
            const next = {
              access_token: data.access_token,
              refresh_token: data.refresh_token || null,
              token_type: data.token_type || "Bearer",
              scope: data.scope || "",
              expires_at: nowMs() + ((data.expires_in || 3600) * 1000) - 60000,
            };
            setSpotifyAuth(next);
            saveSpotifyAuth(next);
            window.history.replaceState({}, document.title, window.location.pathname);
          }
        } catch (e) {

  const fetchGoogleData = useCallback(async () => {
    if (!googleAuth?.access_token) return;

    try {
      const start = new Date(viewDate.getFullYear(), viewDate.getMonth(), 1).toISOString();

      let calendarItems = calendars;
      if (calendarItems.length === 0) {
        const listRes = await googleApiFetch("https://www.googleapis.com/calendar/v3/users/me/calendarList");
        const listData = await listRes.json();
        if (listData.items) {
          calendarItems = listData.items;
          setCalendars(listData.items);
        }
      }

      const ids = selectedCalIds.length > 0 ? selectedCalIds : calendarItems.map((c) => c.id);

      if (ids.length > 0) {
        const results = await Promise.all(
          ids.map((id) =>
            googleApiFetch(
              "https://www.googleapis.com/calendar/v3/calendars/" +
                encodeURIComponent(id) +
                "/events?timeMin=" +
                start +
                "&singleEvents=true&orderBy=startTime"
            )
              .then((r) => r.json())
              .catch(() => ({ items: [] }))
          )
        );

        const merged = results
          .flatMap((r) => r.items || [])
          .map((ev) => ({
            title: ev.summary || "Untitled",
            rawDate: ev.start?.dateTime || ev.start?.date,
            time: ev.start?.dateTime

        setEvents(merged);

        "https://www.googleapis.com/tasks/v1/lists/@default/tasks?showCompleted=false&maxResults=10"

      setTasks(dT.items ? dT.items.map((tk) => ({ id: tk.id, title: tk.title })) : []);

    const redirectUri = window.location.origin + window.location.pathname;
    const params = new URLSearchParams({
      client_id: SPOTIFY_CLIENT_ID,
      response_type: "code",
      redirect_uri: redirectUri,
      code_challenge_method: "S256",
      code_challenge: codeChallenge,
      scope: "user-read-currently-playing user-read-playback-state user-modify-playback-state",

    window.location.href = "https://accounts.spotify.com/authorize?" + params.toString();

          "flex justify-between items-center mb-4 bg-white/50 dark:bg-stone-900/50 border border-stone-200/60 p-3 px-4 md:px-5 rounded-[32px] shadow-sm flex-shrink-0",
      },
      h(
        "div",
        { className: "flex gap-2" },
        ["home", "weather", "habits", "calendar"].map((tab) =>
          h(
            "button",
            {
              key: tab,
              onClick: () => setActiveTab(tab),
              className:
                "text-[10px] font-bold px-5 py-2.5 rounded-2xl transition-all " +
                (activeTab === tab
                  ? "bg-stone-800 text-white shadow-md"
                  : "text-stone-400 hover:text-stone-700 uppercase"),
            },
            tab
          )
        )
      ),

      h(
        "div",
        { className: "flex items-center gap-6" },
        h(
          "div",
          { className: "flex items-center gap-3 border-r border-stone-200 dark:border-stone-800 pr-6" },
          h(
            "button",
            {
              onClick: toggleFullscreen,
              className:
                "p-2 rounded-xl transition-all " +
                (isFullscreenMode ? "bg-stone-800 text-white shadow-lg" : "text-stone-300 hover:text-stone-800"),
            },
            h(
              "svg",
              { width: 18, height: 18, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: 2.5 },
              h("path", {
                d: isFullscreenMode
                  ? "M4 14h6v6m10-6h-6v6M4 10h6V4m10 6h-6V4"
                  : "M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3",
              })
            )
          ),
          h(
            "button",
            {
              onClick: () => setIsIdle(true),
              className: "p-2 text-stone-300 hover:text-stone-800",
            },
            h(
              "svg",
              { width: 18, height: 18, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: 2.5 },
              h("path", {
                d: "m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z",
              })
            )
          ),
          h(
            "button",
            {
              onClick: () => setActiveTab("settings"),
              className:
                "p-2 rounded-xl transition-all " +
                (activeTab === "settings" ? "bg-stone-800 text-white shadow-lg" : "text-stone-300 hover:text-stone-800"),
            },
            h(
              "svg",
              { width: 18, height: 18, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: 2.2 },
              h("circle", { cx: 12, cy: 12, r: 3 }),
              h("path", {
                d: "M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h.01a1.65 1.65 0 0 0 .99-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 .99 1.51h.01a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v.01a1.65 1.65 0 0 0 1.51.99H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51.99Z",
              })
            )
          )
        ),

        h(ThemeToggle, {
          isDarkMode,
          onToggle: () => setIsDarkMode(!isDarkMode),
        }),

        h(
          "div",
          { className: "flex items-center gap-2" },
          !googleAuth?.access_token &&
            h(
              "button",
              {
                onClick: loginGoogle,
                className:
                  "text-[10px] font-bold bg-white text-stone-900 dark:bg-stone-950 dark:text-white border border-stone-200 dark:border-stone-700 px-5 py-2.5 rounded-2xl shadow-sm hover:bg-stone-50 transition-all",
              },
              "GOOGLE"
            ),
          googleErrorLabel &&
            h("span", { className: "text-[10px] font-bold text-amber-500 uppercase" }, googleErrorLabel),
          !spotifyAuth?.access_token &&
            h(
              "button",
              {
                onClick: loginSpotify,
                className:
                  "text-[10px] font-bold bg-white text-stone-900 dark:bg-stone-950 dark:text-white border border-stone-200 dark:border-stone-700 px-5 py-2.5 rounded-2xl shadow-sm hover:bg-stone-50 transition-all",
              },
              "SPOTIFY"
            )
        )
      )
    ),

    getPageContent(),

    h(
      "footer",
      {
        className:
          "py-6 mt-auto text-center text-[10px] text-stone-200 dark:text-stone-950 uppercase font-black tracking-[0.7em] flex-shrink-0 " +
          (isFullscreenMode ? "hidden" : ""),
      },
      "Dayboard • Balance"
    )
  );
}

try {
  const root = ReactDOM.createRoot(document.getElementById("root"));
  root.render(h(App));
} catch (err) {
  console.error("App failed to render:", err);
  const loader = document.getElementById("loader");
  if (loader) loader.style.display = "none";
  const root = document.getElementById("root");
  root.innerHTML =
    '<div style="padding:32px;font-family:Inter,sans-serif;color:#7f1d1d;">' +
    "<h1>App failed to load</h1>" +
    "<p>Open DevTools console to see the error.</p>" +
    "</div>";
}
</script>
</body>
</html>
